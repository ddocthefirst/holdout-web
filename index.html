<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>HOLDOUT</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #000;
    overflow: hidden;
    width: 100vw;
    height: 100vh;
    font-family: 'Courier New', monospace;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  #container {
    position: relative;
    width: 420px;
    height: 100vh;
    max-height: 820px;
    overflow: hidden;
  }
  canvas { display: block; width: 100%; height: 100%; }
  #ui {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    display: flex;
    flex-direction: column;
    pointer-events: none;
  }

  /* HUD top bar */
  #hud {
    padding: 10px 14px 8px;
    background: linear-gradient(to bottom, rgba(0,0,0,0.85), transparent);
    pointer-events: none;
  }
  .hud-title {
    font-size: 11px;
    color: #c8a96e;
    letter-spacing: 4px;
    text-align: center;
    margin-bottom: 8px;
    text-shadow: 0 0 12px rgba(200,169,110,0.8);
  }
  .hud-chars {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
  }
  .hud-char { display: flex; flex-direction: column; gap: 2px; }
  .hud-name { font-size: 9px; color: #c8a96e; letter-spacing: 2px; }
  .hud-name.dead { color: #555; text-decoration: line-through; }
  .mini-bars { display: flex; flex-direction: column; gap: 2px; }
  .mini-bar-wrap { display: flex; align-items: center; gap: 4px; }
  .mini-bar-label { font-size: 8px; color: #556; width: 12px; }
  .mini-bar-bg { flex: 1; height: 3px; background: rgba(255,255,255,0.1); }
  .mini-bar-fill { height: 3px; transition: width 0.5s; }
  .bar-hp { background: #7ac74f; }
  .bar-hunger { background: #c8a96e; }
  .bar-mood { background: #4a9eff; }

  /* Resources strip */
  #resources {
    display: flex;
    justify-content: center;
    gap: 16px;
    padding: 6px 14px;
    background: rgba(0,0,0,0.4);
    font-size: 11px;
    color: #c8a96e;
    pointer-events: none;
  }
  .res { display: flex; align-items: center; gap: 4px; }
  .res-icon { font-size: 12px; }
  .res-val { color: #e8e0d0; }

  /* Scene spacer */
  #scene-space { flex: 1; }

  /* Moral + day strip */
  #moral-strip {
    padding: 5px 14px;
    background: rgba(0,0,0,0.5);
    display: flex;
    align-items: center;
    justify-content: space-between;
    pointer-events: none;
  }
  .moral-label { font-size: 9px; color: #556; letter-spacing: 1px; }
  .moral-bar-outer { flex: 1; margin: 0 10px; height: 3px; background: rgba(233,69,96,0.4); }
  .moral-bar-inner { height: 3px; background: #7ac74f; transition: width 0.6s; }
  .day-label { font-size: 9px; color: #4a9eff; letter-spacing: 1px; }

  /* Log */
  #log {
    height: 48px;
    overflow: hidden;
    padding: 0 14px;
    background: rgba(0,0,0,0.7);
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
    padding-bottom: 6px;
    pointer-events: none;
  }
  .log-line {
    font-size: 10px;
    color: #667;
    line-height: 1.5;
    transition: color 0.5s;
  }
  .log-line.new { color: #aaa; }
  .log-line.good { color: #7ac74f; }
  .log-line.danger { color: #e94560; }
  .log-line.moral { color: #a855f7; }
  .log-line.amber { color: #c8a96e; }

  /* Action buttons */
  #actions {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    padding: 8px 12px;
    background: rgba(0,0,0,0.85);
    pointer-events: all;
  }
  .act-btn {
    flex: 1 1 calc(50% - 3px);
    background: transparent;
    border: 1px solid #333;
    color: #aaa;
    font-family: 'Courier New', monospace;
    font-size: 10px;
    padding: 7px 8px;
    cursor: pointer;
    text-align: left;
    line-height: 1.4;
    letter-spacing: 0.5px;
    transition: border-color 0.2s, color 0.2s, background 0.2s;
  }
  .act-btn:hover:not(:disabled) { border-color: #c8a96e; color: #c8a96e; background: rgba(200,169,110,0.06); }
  .act-btn:disabled { opacity: 0.25; cursor: default; }
  .act-btn.wide { flex: 1 1 100%; border-color: #1a3a5c; color: #4a9eff; }
  .act-btn.wide:hover:not(:disabled) { border-color: #4a9eff; background: rgba(74,158,255,0.08); color: #fff; }
  .act-btn.night-btn { border-color: #3a1a2e; color: #a855f7; }
  .act-btn.night-btn:hover:not(:disabled) { border-color: #a855f7; background: rgba(168,85,247,0.08); color: #fff; }
  .act-btn .cost { display: block; font-size: 9px; color: #556; margin-top: 2px; }

  /* Modal */
  #modal {
    display: none;
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,0);
    z-index: 10;
    flex-direction: column;
    justify-content: flex-end;
    pointer-events: all;
    transition: background 0.3s;
  }
  #modal.open {
    display: flex;
    background: rgba(0,0,0,0.78);
  }
  #modal-inner {
    background: #090e1a;
    border-top: 1px solid #c8a96e;
    padding: 16px 14px 14px;
    transform: translateY(100%);
    transition: transform 0.35s cubic-bezier(0.22,1,0.36,1);
  }
  #modal.open #modal-inner { transform: translateY(0); }
  #modal-scene {
    width: 100%;
    height: 120px;
    margin-bottom: 10px;
    display: block;
  }
  #modal-title {
    font-size: 11px;
    color: #c8a96e;
    letter-spacing: 3px;
    margin-bottom: 6px;
  }
  #modal-text {
    font-size: 11px;
    color: #889;
    line-height: 1.7;
    margin-bottom: 12px;
  }
  .choice {
    background: transparent;
    border: 1px solid #222;
    color: #889;
    font-family: 'Courier New', monospace;
    font-size: 10px;
    padding: 9px 12px;
    width: 100%;
    text-align: left;
    cursor: pointer;
    line-height: 1.5;
    margin-bottom: 5px;
    letter-spacing: 0.3px;
    transition: all 0.2s;
  }
  .choice:hover { border-color: #c8a96e; color: #e8e0d0; background: rgba(200,169,110,0.05); }
  .choice.good { border-left: 2px solid #7ac74f; }
  .choice.bad  { border-left: 2px solid #e94560; }

  /* Game over */
  #gameover {
    display: none;
    position: absolute;
    inset: 0;
    background: #000;
    z-index: 20;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    pointer-events: all;
  }
  #gameover.open { display: flex; }
  #gameover h2 { color: #e94560; font-size: 22px; letter-spacing: 6px; margin-bottom: 20px; text-shadow: 0 0 30px rgba(233,69,96,0.6); }
  #gameover .go-stats { color: #556; font-size: 11px; line-height: 2.2; text-align: center; margin-bottom: 24px; }
  #gameover .go-stats span { color: #c8a96e; }
  #replay-btn {
    background: transparent;
    border: 1px solid #333;
    color: #556;
    font-family: 'Courier New', monospace;
    font-size: 11px;
    letter-spacing: 2px;
    padding: 10px 28px;
    cursor: pointer;
  }
  #replay-btn:hover { border-color: #c8a96e; color: #c8a96e; }
</style>
</head>
<body>
<div id="container">
  <canvas id="bg"></canvas>

  <div id="ui">
    <!-- HUD -->
    <div id="hud">
      <div class="hud-title">H O L D O U T</div>
      <div class="hud-chars">
        <div class="hud-char">
          <div class="hud-name" id="maraName">MARA</div>
          <div class="mini-bars">
            <div class="mini-bar-wrap"><span class="mini-bar-label">HP</span><div class="mini-bar-bg"><div class="mini-bar-fill bar-hp" id="maraHp" style="width:100%"></div></div></div>
            <div class="mini-bar-wrap"><span class="mini-bar-label">FD</span><div class="mini-bar-bg"><div class="mini-bar-fill bar-hunger" id="maraFd" style="width:80%"></div></div></div>
            <div class="mini-bar-wrap"><span class="mini-bar-label">MD</span><div class="mini-bar-bg"><div class="mini-bar-fill bar-mood" id="maraMd" style="width:90%"></div></div></div>
          </div>
        </div>
        <div class="hud-char">
          <div class="hud-name" id="eliName">ELI</div>
          <div class="mini-bars">
            <div class="mini-bar-wrap"><span class="mini-bar-label">HP</span><div class="mini-bar-bg"><div class="mini-bar-fill bar-hp" id="eliHp" style="width:100%"></div></div></div>
            <div class="mini-bar-wrap"><span class="mini-bar-label">FD</span><div class="mini-bar-bg"><div class="mini-bar-fill bar-hunger" id="eliFd" style="width:80%"></div></div></div>
            <div class="mini-bar-wrap"><span class="mini-bar-label">MD</span><div class="mini-bar-bg"><div class="mini-bar-fill bar-mood" id="eliMd" style="width:85%"></div></div></div>
          </div>
        </div>
      </div>
    </div>

    <!-- Resources -->
    <div id="resources">
      <div class="res"><span class="res-icon">🍞</span><span class="res-val" id="rFood">8</span></div>
      <div class="res"><span class="res-icon">💊</span><span class="res-val" id="rMeds">2</span></div>
      <div class="res"><span class="res-icon">🔩</span><span class="res-val" id="rParts">5</span></div>
      <div class="res"><span class="res-icon">🔋</span><span class="res-val" id="rFuel">3</span></div>
    </div>

    <div id="scene-space"></div>

    <!-- Moral / day strip -->
    <div id="moral-strip">
      <span class="moral-label">MORAL</span>
      <div class="moral-bar-outer"><div class="moral-bar-inner" id="moralBar" style="width:80%"></div></div>
      <span class="day-label" id="dayLabel">DAY 1</span>
    </div>

    <!-- Log -->
    <div id="log">
      <div class="log-line">The shelter holds. For now.</div>
      <div class="log-line new">Mara watches the street. Eli checks the boards.</div>
    </div>

    <!-- Actions -->
    <div id="actions">
      <button class="act-btn" onclick="feedBoth()">🍞 Feed both<span class="cost">−2 food</span></button>
      <button class="act-btn" onclick="healChar('mara')">💊 Treat Mara<span class="cost">−1 meds</span></button>
      <button class="act-btn" onclick="healChar('eli')">💊 Treat Eli<span class="cost">−1 meds</span></button>
      <button class="act-btn" onclick="buildShelter()">🔩 Fortify (Eli)<span class="cost">−2 parts</span></button>
      <button class="act-btn wide night-btn" id="phaseBtn" onclick="phaseAction()">▸ SEND MARA TO SCAVENGE</button>
    </div>
  </div>

  <!-- Event modal -->
  <div id="modal">
    <div id="modal-inner">
      <canvas id="modal-scene" width="392" height="120"></canvas>
      <div id="modal-title"></div>
      <div id="modal-text"></div>
      <div id="modal-choices"></div>
    </div>
  </div>

  <!-- Game over -->
  <div id="gameover">
    <h2>THEY'RE GONE</h2>
    <div class="go-stats" id="goStats"></div>
    <button id="replay-btn" onclick="resetGame()">PLAY AGAIN</button>
  </div>
</div>

<script>
// ─── State ─────────────────────────────────────────────────────────────────
const S = {
  day: 1, phase: 'day', moral: 80,
  food: 8, meds: 2, parts: 5, fuel: 3,
  shelter: 1,
  mara: { hp: 100, food: 80, mood: 90, alive: true },
  eli:  { hp: 100, food: 80, mood: 85, alive: true },
};
let usedEvents = [], eventQueue = [], time = 0;

// ─── BG Canvas ─────────────────────────────────────────────────────────────
const bgCanvas = document.getElementById('bg');
const bgCtx = bgCanvas.getContext('2d');
const W = 420, H = 820;
bgCanvas.width = W; bgCanvas.height = H;

// Rain particles
const rain = Array.from({length: 120}, () => ({
  x: Math.random() * W,
  y: Math.random() * H,
  len: 8 + Math.random() * 14,
  speed: 6 + Math.random() * 8,
  alpha: 0.15 + Math.random() * 0.3,
}));

// Building silhouettes (procedural)
const bgBuildings = Array.from({length: 12}, (_, i) => ({
  x: (i / 12) * W * 1.3 - 20,
  w: 28 + Math.random() * 40,
  h: 80 + Math.random() * 200,
  windows: Array.from({length: 8}, () => ({ lit: Math.random() > 0.6, x: Math.random(), y: Math.random() })),
}));
const fgBuildings = Array.from({length: 6}, (_, i) => ({
  x: (i / 6) * W * 1.1 - 10,
  w: 40 + Math.random() * 60,
  h: 60 + Math.random() * 100,
}));

// Character animation state
let maraX = 95, eliX = 195;
let maraWalk = 0, eliWalk = 0;
let scavengeX = -40; // mara walking off screen at night
let nightProgress = 0; // 0..1 transition

// Window flicker timer
let flickTimer = 0;

function drawScene(t) {
  const isNight = S.phase === 'night';
  const dt = t - (drawScene._last || t);
  drawScene._last = t;
  time += dt * 0.001;

  // Sky gradient
  const sky = bgCtx.createLinearGradient(0, 0, 0, H);
  if (isNight) {
    sky.addColorStop(0, '#010510');
    sky.addColorStop(0.5, '#060c1e');
    sky.addColorStop(1, '#0a0f20');
  } else {
    sky.addColorStop(0, '#050c1e');
    sky.addColorStop(0.5, '#0d1830');
    sky.addColorStop(1, '#111c35');
  }
  bgCtx.fillStyle = sky;
  bgCtx.fillRect(0, 0, W, H);

  // Moon / glow
  if (isNight) {
    const moonX = W * 0.75, moonY = 60;
    const moonGlow = bgCtx.createRadialGradient(moonX, moonY, 0, moonX, moonY, 80);
    moonGlow.addColorStop(0, 'rgba(200,220,255,0.18)');
    moonGlow.addColorStop(1, 'transparent');
    bgCtx.fillStyle = moonGlow;
    bgCtx.fillRect(0, 0, W, H);
    bgCtx.beginPath();
    bgCtx.arc(moonX, moonY, 18, 0, Math.PI * 2);
    bgCtx.fillStyle = 'rgba(220,230,255,0.85)';
    bgCtx.fill();
  } else {
    // Dim amber glow (candle through window)
    const glow = bgCtx.createRadialGradient(W * 0.3, H * 0.55, 0, W * 0.3, H * 0.55, 120);
    glow.addColorStop(0, 'rgba(200,140,50,0.12)');
    glow.addColorStop(1, 'transparent');
    bgCtx.fillStyle = glow;
    bgCtx.fillRect(0, 0, W, H);
  }

  // Stars (night only)
  if (isNight) {
    bgCtx.fillStyle = 'rgba(200,220,255,0.7)';
    for (let i = 0; i < 40; i++) {
      const sx = ((i * 137.5) % 1) * W;
      const sy = ((i * 97.3) % 0.35) * H;
      const blink = Math.sin(time * 2 + i) * 0.5 + 0.5;
      bgCtx.globalAlpha = blink * 0.7;
      bgCtx.fillRect(sx, sy, 1, 1);
    }
    bgCtx.globalAlpha = 1;
  }

  // Far buildings (silhouettes)
  const groundY = H * 0.72;
  bgBuildings.forEach(b => {
    const by = groundY - b.h;
    bgCtx.fillStyle = isNight ? '#05080f' : '#06090e';
    bgCtx.fillRect(b.x, by, b.w, b.h);
    // Windows
    b.windows.forEach((w, wi) => {
      if (!w.lit) return;
      const wx = b.x + 4 + w.x * (b.w - 10);
      const wy = by + 8 + w.y * (b.h - 20);
      const flick = Math.sin(time * 3 + wi * 7) > 0.97 ? 0 : 1;
      bgCtx.fillStyle = isNight
        ? `rgba(255,220,120,${0.5 * flick})`
        : `rgba(255,200,80,${0.2 * flick})`;
      bgCtx.fillRect(wx, wy, 5, 7);
    });
  });

  // Ground
  bgCtx.fillStyle = isNight ? '#04060c' : '#060910';
  bgCtx.fillRect(0, groundY, W, H - groundY);

  // Ground line detail
  bgCtx.strokeStyle = 'rgba(74,158,255,0.08)';
  bgCtx.lineWidth = 1;
  bgCtx.beginPath();
  bgCtx.moveTo(0, groundY);
  bgCtx.lineTo(W, groundY);
  bgCtx.stroke();

  // Foreground buildings (pure black)
  fgBuildings.forEach(b => {
    bgCtx.fillStyle = '#010204';
    bgCtx.fillRect(b.x, groundY - b.h, b.w, b.h);
  });

  // Shelter (day view: interior wall / night: exterior)
  if (!isNight) {
    drawShelterInterior(groundY);
  } else {
    drawShelterExterior(groundY);
  }

  // Rain (night)
  if (isNight) {
    bgCtx.strokeStyle = 'rgba(120,160,240,0.22)';
    bgCtx.lineWidth = 1;
    rain.forEach(r => {
      r.y += r.speed;
      r.x -= 1.5;
      if (r.y > H) { r.y = -r.len; r.x = Math.random() * W; }
      bgCtx.globalAlpha = r.alpha;
      bgCtx.beginPath();
      bgCtx.moveTo(r.x, r.y);
      bgCtx.lineTo(r.x - 2, r.y + r.len);
      bgCtx.stroke();
    });
    bgCtx.globalAlpha = 1;
    bgCtx.lineWidth = 1;
  }

  // Characters
  if (!isNight) {
    drawCharacter(bgCtx, maraX, groundY - 2, maraWalk, S.mara.alive, '#c8a96e', false);
    drawCharacter(bgCtx, eliX, groundY - 2, eliWalk * 0.4, S.eli.alive, '#4a9eff', true);
  } else {
    // Mara walking off screen
    scavengeX += 0.4;
    if (scavengeX > W + 40) scavengeX = W * 0.6;
    maraWalk += 0.12;
    drawCharacter(bgCtx, scavengeX, groundY - 2, maraWalk, S.mara.alive, '#c8a96e', false);
    if (S.eli.alive) {
      // Eli in shelter window
      drawCharacterSmall(bgCtx, 60, groundY - 48, S.eli.alive);
    }
  }

  // Idle sway
  maraWalk += 0.02;
  eliWalk += 0.02;

  // Puddle reflections (night)
  if (isNight) {
    bgCtx.fillStyle = 'rgba(74,158,255,0.04)';
    bgCtx.fillRect(80, groundY + 2, 60, 4);
    bgCtx.fillRect(240, groundY + 3, 45, 3);
    bgCtx.fillRect(330, groundY + 1, 30, 4);
  }

  // Amber lamp post glow (day)
  if (!isNight) {
    const lampX = W * 0.55;
    const lampY = groundY - 20;
    const lampGlow = bgCtx.createRadialGradient(lampX, lampY, 0, lampX, lampY, 60);
    lampGlow.addColorStop(0, 'rgba(200,140,50,0.09)');
    lampGlow.addColorStop(1, 'transparent');
    bgCtx.fillStyle = lampGlow;
    bgCtx.fillRect(lampX - 60, lampY - 60, 120, 80);
  }
}

function drawShelterInterior(gy) {
  // Floor
  bgCtx.fillStyle = '#0a0c12';
  bgCtx.fillRect(20, gy - 160, W - 40, 160);
  // Walls
  bgCtx.fillStyle = '#070810';
  bgCtx.fillRect(20, gy - 160, 6, 160);
  bgCtx.fillRect(W - 26, gy - 160, 6, 160);
  // Ceiling
  bgCtx.fillStyle = '#050608';
  bgCtx.fillRect(20, gy - 162, W - 40, 8);
  // Window cutout (right wall)
  const winX = W - 80, winY = gy - 130, winW = 40, winH = 50;
  bgCtx.fillStyle = 'rgba(5,10,25,0.9)';
  bgCtx.fillRect(winX, winY, winW, winH);
  bgCtx.strokeStyle = '#1a2030';
  bgCtx.lineWidth = 2;
  bgCtx.strokeRect(winX, winY, winW, winH);
  // Cross on window
  bgCtx.strokeStyle = '#0f1520';
  bgCtx.beginPath();
  bgCtx.moveTo(winX + winW/2, winY); bgCtx.lineTo(winX + winW/2, winY + winH);
  bgCtx.moveTo(winX, winY + winH/2); bgCtx.lineTo(winX + winW, winY + winH/2);
  bgCtx.stroke();
  // Candle flicker
  const cx = 155, cy = gy - 30;
  const flicker = Math.sin(time * 8) * 0.3 + 0.7;
  const candleGlow = bgCtx.createRadialGradient(cx, cy, 0, cx, cy, 45);
  candleGlow.addColorStop(0, `rgba(255,180,60,${0.35 * flicker})`);
  candleGlow.addColorStop(1, 'transparent');
  bgCtx.fillStyle = candleGlow;
  bgCtx.fillRect(cx - 45, cy - 45, 90, 50);
  bgCtx.fillStyle = '#c8a96e';
  bgCtx.fillRect(cx - 2, cy - 10, 4, 12);
  bgCtx.fillStyle = `rgba(255,200,60,${flicker})`;
  bgCtx.beginPath();
  bgCtx.ellipse(cx, cy - 13, 3, 5, 0, 0, Math.PI * 2);
  bgCtx.fill();
}

function drawShelterExterior(gy) {
  // Building face
  bgCtx.fillStyle = '#03050a';
  bgCtx.fillRect(10, gy - 180, 110, 180);
  // Boards
  bgCtx.strokeStyle = '#0c0f18';
  bgCtx.lineWidth = 2;
  for (let i = 0; i < 5; i++) {
    bgCtx.beginPath();
    bgCtx.moveTo(10, gy - 30 - i * 30);
    bgCtx.lineTo(120, gy - 30 - i * 30);
    bgCtx.stroke();
  }
  // Door
  bgCtx.fillStyle = '#020408';
  bgCtx.fillRect(40, gy - 70, 30, 70);
  bgCtx.strokeStyle = '#0f1520';
  bgCtx.lineWidth = 1;
  bgCtx.strokeRect(40, gy - 70, 30, 70);
  // Lit window
  const winFlick = Math.sin(time * 6) * 0.15 + 0.85;
  bgCtx.fillStyle = `rgba(200,140,50,${0.4 * winFlick})`;
  bgCtx.fillRect(80, gy - 130, 24, 28);
  // Window glow
  const wg = bgCtx.createRadialGradient(92, gy - 116, 0, 92, gy - 116, 30);
  wg.addColorStop(0, `rgba(200,140,50,${0.25 * winFlick})`);
  wg.addColorStop(1, 'transparent');
  bgCtx.fillStyle = wg;
  bgCtx.fillRect(62, gy - 146, 60, 60);
}

function drawCharacter(ctx, x, y, walk, alive, tint, isTall) {
  if (!alive) return;
  const bob = Math.sin(walk * 2) * 1.5;
  const h = isTall ? 52 : 46;
  ctx.save();
  ctx.translate(x, y + bob);
  ctx.fillStyle = '#000';
  ctx.shadowColor = tint;
  ctx.shadowBlur = 8;
  // Body
  ctx.fillRect(-6, -h, 12, h * 0.45);
  // Head
  ctx.beginPath();
  ctx.arc(0, -h - 8, 8, 0, Math.PI * 2);
  ctx.fill();
  // Legs
  const legSwing = Math.sin(walk * 2) * 8;
  ctx.beginPath();
  ctx.moveTo(-3, -h * 0.55);
  ctx.lineTo(-3 + legSwing, -h * 0.05);
  ctx.lineTo(-5 + legSwing, 0);
  ctx.stroke && ctx.stroke();
  ctx.fillStyle = '#000';
  ctx.fillRect(-7 + legSwing * 0.5, -h * 0.3, 5, h * 0.4);
  ctx.fillRect(2 - legSwing * 0.5, -h * 0.3, 5, h * 0.4);
  // Arms
  ctx.fillRect(-10, -h + 4, 4, h * 0.28);
  ctx.fillRect(6, -h + 4, 4, h * 0.28);
  ctx.shadowBlur = 0;
  ctx.restore();
}

function drawCharacterSmall(ctx, x, y, alive) {
  if (!alive) return;
  const bob = Math.sin(time * 2) * 1;
  ctx.save();
  ctx.translate(x, y + bob);
  ctx.fillStyle = '#000';
  ctx.shadowColor = '#4a9eff';
  ctx.shadowBlur = 6;
  ctx.beginPath();
  ctx.arc(0, -20, 5, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillRect(-4, -15, 8, 12);
  ctx.shadowBlur = 0;
  ctx.restore();
}

// ─── Modal scene drawings ─────────────────────────────────────────────────
function drawEventScene(canvasEl, eventId) {
  const ctx = canvasEl.getContext('2d');
  const w = canvasEl.width, h = canvasEl.height;
  ctx.fillStyle = '#030508';
  ctx.fillRect(0, 0, w, h);
  const t2 = time;

  const ground = h * 0.78;
  // Sky strip
  const sky = ctx.createLinearGradient(0, 0, 0, ground);
  sky.addColorStop(0, '#020510');
  sky.addColorStop(1, '#05091a');
  ctx.fillStyle = sky;
  ctx.fillRect(0, 0, w, ground);
  ctx.fillStyle = '#020305';
  ctx.fillRect(0, ground, w, h - ground);

  if (eventId === 'stranger') {
    // Doorway + two figures outside
    // Door
    ctx.fillStyle = '#01020a';
    ctx.fillRect(w * 0.42, h * 0.25, w * 0.16, h * 0.53);
    ctx.strokeStyle = '#0f1520';
    ctx.lineWidth = 3;
    ctx.strokeRect(w * 0.42, h * 0.25, w * 0.16, h * 0.53);
    // Amber glow from inside
    const glow = ctx.createRadialGradient(w*0.5, h*0.5, 0, w*0.5, h*0.5, 50);
    glow.addColorStop(0, 'rgba(200,140,50,0.35)');
    glow.addColorStop(1, 'transparent');
    ctx.fillStyle = glow;
    ctx.fillRect(0, 0, w, h);
    // Woman silhouette
    ctx.fillStyle = '#000'; ctx.shadowColor = '#c8a96e'; ctx.shadowBlur = 4;
    ctx.beginPath(); ctx.arc(w*0.3, ground - 55, 7, 0, Math.PI*2); ctx.fill();
    ctx.fillRect(w*0.3 - 5, ground - 48, 10, 26);
    ctx.fillRect(w*0.3 - 4, ground - 22, 4, 22);
    ctx.fillRect(w*0.3 + 1, ground - 22, 4, 22);
    // Child
    ctx.beginPath(); ctx.arc(w*0.22, ground - 36, 5, 0, Math.PI*2); ctx.fill();
    ctx.fillRect(w*0.22 - 3, ground - 31, 7, 18);
    ctx.fillRect(w*0.22 - 3, ground - 13, 3, 13);
    ctx.fillRect(w*0.22 + 1, ground - 13, 3, 13);
    ctx.shadowBlur = 0;
    // Rain
    ctx.strokeStyle = 'rgba(120,160,240,0.3)'; ctx.lineWidth = 1;
    for (let i = 0; i < 18; i++) {
      const rx = (i * 23 + t2 * 30) % w;
      const ry = (i * 37 + t2 * 50) % ground;
      ctx.beginPath(); ctx.moveTo(rx, ry); ctx.lineTo(rx - 1, ry + 7); ctx.stroke();
    }
  } else if (eventId === 'cache') {
    // Store shelves, family huddled
    ctx.fillStyle = '#010208';
    ctx.fillRect(w*0.1, h*0.15, w*0.8, h*0.6);
    // Shelf lines
    ctx.strokeStyle = '#08101e'; ctx.lineWidth = 2;
    for (let i = 1; i < 4; i++) { ctx.beginPath(); ctx.moveTo(w*0.1, h*(0.15 + i*0.15)); ctx.lineTo(w*0.9, h*(0.15 + i*0.15)); ctx.stroke(); }
    // Family: 3 figures crouched
    const fY = ground - 10;
    [w*0.6, w*0.7, w*0.78].forEach((fx, fi) => {
      const sz = fi === 1 ? 5 : 7;
      ctx.fillStyle = '#000'; ctx.shadowColor = '#4a9eff'; ctx.shadowBlur = 3;
      ctx.beginPath(); ctx.arc(fx, fY - sz*3, sz, 0, Math.PI*2); ctx.fill();
      ctx.fillRect(fx - sz * 0.6, fY - sz*2.5, sz*1.2, sz*2.2);
      ctx.shadowBlur = 0;
    });
    // Mara looking in (left)
    ctx.fillStyle = '#000'; ctx.shadowColor = '#c8a96e'; ctx.shadowBlur = 5;
    ctx.beginPath(); ctx.arc(w*0.2, fY - 42, 7, 0, Math.PI*2); ctx.fill();
    ctx.fillRect(w*0.2 - 5, fY - 35, 10, 26);
    ctx.shadowBlur = 0;
  } else if (eventId === 'raiders') {
    // 3 armed silhouettes + arrows pointing at shelter
    const raiders = [w*0.55, w*0.68, w*0.78];
    raiders.forEach((rx, ri) => {
      ctx.fillStyle = '#000'; ctx.shadowColor = '#e94560'; ctx.shadowBlur = 5;
      ctx.beginPath(); ctx.arc(rx, ground - 50, 7, 0, Math.PI*2); ctx.fill();
      ctx.fillRect(rx - 5, ground - 43, 10, 24);
      // Gun shape
      ctx.fillRect(rx - 14, ground - 36, 14, 3);
      ctx.fillRect(rx - 8, ground - 36, 3, 6);
      ctx.shadowBlur = 0;
    });
    // Shelter
    ctx.fillStyle = '#020308';
    ctx.fillRect(w*0.05, ground - 80, 80, 80);
    ctx.strokeStyle = '#c8a96e'; ctx.lineWidth = 1; ctx.globalAlpha = 0.3;
    ctx.strokeRect(w*0.05, ground - 80, 80, 80);
    ctx.globalAlpha = 1;
  } else if (eventId === 'medicine') {
    // Clinic shelves with cross
    ctx.strokeStyle = '#1a3050'; ctx.lineWidth = 3;
    ctx.beginPath(); ctx.moveTo(w*0.5, h*0.1); ctx.lineTo(w*0.5, h*0.5); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(w*0.35, h*0.25); ctx.lineTo(w*0.65, h*0.25); ctx.stroke();
    ctx.strokeStyle = '#0a1830'; ctx.lineWidth = 1;
    // Note on counter
    ctx.fillStyle = '#0c1a2e';
    ctx.fillRect(w*0.3, ground - 35, 60, 30);
    ctx.fillStyle = '#c8a96e'; ctx.globalAlpha = 0.4;
    ctx.font = '8px Courier New';
    ctx.fillText('please leave', w*0.32, ground - 22);
    ctx.fillText('some', w*0.38, ground - 12);
    ctx.globalAlpha = 1;
    // Meds bottles
    [w*0.35, w*0.48, w*0.6].forEach(bx => {
      ctx.fillStyle = '#000'; ctx.shadowColor = '#7ac74f'; ctx.shadowBlur = 4;
      ctx.fillRect(bx, ground - 55, 8, 14);
      ctx.shadowBlur = 0;
    });
  } else {
    // Default: city night + Mara digging
    ctx.fillStyle = '#000'; ctx.shadowColor = '#c8a96e'; ctx.shadowBlur = 8;
    ctx.beginPath(); ctx.arc(w*0.5, ground - 55, 8, 0, Math.PI*2); ctx.fill();
    ctx.fillRect(w*0.5 - 6, ground - 47, 12, 30);
    // Shovel
    ctx.fillRect(w*0.5 + 4, ground - 55, 3, 45);
    ctx.fillRect(w*0.5 + 1, ground - 15, 8, 6);
    ctx.shadowBlur = 0;
    // X mark on ground
    ctx.strokeStyle = '#c8a96e'; ctx.globalAlpha = 0.5; ctx.lineWidth = 2;
    ctx.beginPath(); ctx.moveTo(w*0.3 - 6, ground - 6); ctx.lineTo(w*0.3 + 6, ground + 6); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(w*0.3 + 6, ground - 6); ctx.lineTo(w*0.3 - 6, ground + 6); ctx.stroke();
    ctx.globalAlpha = 1;
  }
}

// ─── Animation loop ─────────────────────────────────────────────────────
function loop(t) {
  drawScene(t);
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);

// ─── UI helpers ─────────────────────────────────────────────────────────
function setBar(id, pct) {
  const el = document.getElementById(id);
  if (el) el.style.width = Math.max(0, pct) + '%';
}
function setText(id, val) {
  const el = document.getElementById(id);
  if (el) el.textContent = val;
}

function updateUI() {
  const m = S.mara, e = S.eli;
  setBar('maraHp', m.hp); setBar('maraFd', m.food); setBar('maraMd', m.mood);
  setBar('eliHp',  e.hp); setBar('eliFd',  e.food); setBar('eliMd',  e.mood);
  setText('rFood', S.food); setText('rMeds', S.meds); setText('rParts', S.parts); setText('rFuel', S.fuel);
  setText('dayLabel', 'DAY ' + S.day);
  setBar('moralBar', S.moral);
  document.getElementById('maraName').className = 'hud-name' + (m.alive ? '' : ' dead');
  document.getElementById('eliName').className  = 'hud-name' + (e.alive ? '' : ' dead');
  const btn = document.getElementById('phaseBtn');
  if (S.phase === 'day') {
    btn.textContent = '▸ SEND MARA TO SCAVENGE';
    btn.className = 'act-btn wide night-btn';
  } else {
    btn.textContent = '▸ RETURN — END NIGHT';
    btn.className = 'act-btn wide';
  }
}

const logEl = document.getElementById('log');
function log(msg, type = '') {
  const prev = logEl.querySelector('.log-line.new');
  if (prev) { prev.classList.remove('new'); }
  const lines = logEl.querySelectorAll('.log-line');
  if (lines.length >= 2) lines[0].remove();
  const d = document.createElement('div');
  d.className = 'log-line new' + (type ? ' ' + type : '');
  d.textContent = msg;
  logEl.appendChild(d);
}

// ─── Actions ─────────────────────────────────────────────────────────────
function feedBoth() {
  if (S.food < 2) { log('Not enough food.', 'danger'); return; }
  S.food -= 2;
  if (S.mara.alive) S.mara.food = Math.min(100, S.mara.food + 35);
  if (S.eli.alive)  S.eli.food  = Math.min(100, S.eli.food  + 35);
  log('Both eat. The hunger eases, briefly.', 'amber');
  updateUI();
}
function healChar(c) {
  if (!S[c].alive) { log('They\'re gone.', 'danger'); return; }
  if (S.meds < 1) { log('No meds.', 'danger'); return; }
  S.meds -= 1;
  S[c].hp = Math.min(100, S[c].hp + 30);
  log((c === 'mara' ? 'Mara' : 'Eli') + ' treated. Breathes easier.', 'good');
  updateUI();
}
function buildShelter() {
  if (!S.eli.alive) { log('Eli isn\'t here.', 'danger'); return; }
  if (S.parts < 2) { log('Not enough parts.', 'danger'); return; }
  S.parts -= 2;
  S.shelter = Math.min(5, S.shelter + 1);
  S.eli.mood = Math.min(100, S.eli.mood + 10);
  log('Eli works through the night. The walls feel sturdier.', 'good');
  updateUI();
}

// ─── Night events ────────────────────────────────────────────────────────
const EVENTS = [
  {
    id: 'stranger', title: 'A KNOCK AT THE DOOR',
    text: 'A woman and a child stand in the rain. Hollow eyes. They found you somehow. Letting them in means less food. Turning them away means—',
    choices: [
      { text: 'Let them in. Share what you have.', type: 'good', fn() { S.food = Math.max(0, S.food - 3); S.moral = Math.min(100, S.moral + 14); log('You move aside. The child stops crying.', 'good'); } },
      { text: 'Turn them away. You can\'t afford this.', type: 'bad', fn() { S.moral = Math.max(0, S.moral - 20); S.eli.mood = Math.max(0, S.eli.mood - 22); log('Eli won\'t look at you. The door stays shut.', 'moral'); } },
      { text: 'Give them one meal and point them east.', type: '', fn() { S.food = Math.max(0, S.food - 1); S.moral = Math.max(0, S.moral - 5); log('One meal. Maybe enough. Maybe not.', ''); } },
    ]
  },
  {
    id: 'cache', title: 'SOMEONE WAS HERE FIRST',
    text: 'The hardware store wasn\'t empty. A family in the back corner, watching Mara\'s flashlight. They got there first.',
    choices: [
      { text: 'Take only what\'s clearly unclaimed.', type: 'good', fn() { S.parts += 2; S.moral = Math.min(100, S.moral + 6); log('Two cans of wire. You leave the good stuff.', 'good'); } },
      { text: 'Take everything. You need it more.', type: 'bad', fn() { S.parts += 7; S.moral = Math.max(0, S.moral - 24); log('Mara clears the shelves. Nobody fights back. That\'s almost worse.', 'danger'); } },
      { text: 'Offer food for parts.', type: '', fn() { if (S.food >= 2) { S.food -= 2; S.parts += 4; log('Fair trade. Nobody looks happy.', ''); } else log('Nothing to offer.', 'danger'); } },
    ]
  },
  {
    id: 'raiders', title: 'THREE IN THE STREET',
    text: 'Armed figures circling the block. They haven\'t found the shelter. Your neighbors\' light is still on.',
    choices: [
      { text: 'Warn the neighbors quietly.', type: 'good', fn() { S.moral = Math.min(100, S.moral + 10); S.eli.mood = Math.min(100, S.eli.mood + 12); log('They get out in time. Eli exhales.', 'good'); } },
      { text: 'Stay hidden. Don\'t risk it.', type: '', fn() { S.mara.hp = Math.max(0, S.mara.hp - 8); log('Mara stays low for two hours. Her back aches.', ''); } },
      { text: 'Create a distraction — burn fuel.', type: '', fn() { S.fuel = Math.max(0, S.fuel - 2); S.food += 3; log('The fire pulls them. Mara moves through their drop.', 'good'); } },
    ]
  },
  {
    id: 'medicine', title: 'THE CLINIC',
    text: 'An unlocked clinic. Meds still on the shelf. A handwritten note taped to the cabinet: "please leave some."',
    choices: [
      { text: 'Take half. Leave the antibiotics.', type: 'good', fn() { S.meds += 2; S.moral = Math.min(100, S.moral + 10); log('Two bottles. The note stays.', 'good'); } },
      { text: 'Take it all.', type: 'bad', fn() { S.meds += 5; S.moral = Math.max(0, S.moral - 16); log('The note tears when you close the cabinet.', 'moral'); } },
    ]
  },
  {
    id: 'food_cache', title: 'BURIED IN THE PARK',
    text: 'A marked cache near the old fountain. Enough food for a week. A child\'s drawing tied to the handle.',
    choices: [
      { text: 'Take it. Survival first.', type: 'bad', fn() { S.food += 7; S.moral = Math.max(0, S.moral - 12); log('Seven rations. The drawing goes back in the ground.', 'moral'); } },
      { text: 'Take half. Leave the marker.', type: 'good', fn() { S.food += 3; S.moral = Math.min(100, S.moral + 6); log('Three rations. Someone else finds the rest.', 'good'); } },
    ]
  },
];

function phaseAction() {
  if (S.phase === 'day') {
    S.phase = 'night';
    scavengeX = W * 0.4;
    decayStats();
    if (checkDeath()) return;
    const pool = EVENTS.filter(e => !usedEvents.includes(e.id));
    if (!pool.length) { usedEvents = []; }
    const src = pool.length ? pool : EVENTS;
    eventQueue = [...src].sort(() => Math.random() - 0.5).slice(0, 2);
    log('— Night falls. Mara heads out. —', 'amber');
    updateUI();
    setTimeout(nextEvent, 700);
  } else {
    endNight();
  }
}

function nextEvent() {
  if (!eventQueue.length) {
    // Passive scavenge
    if (Math.random() > 0.45) {
      const types = ['food', 'meds', 'parts', 'fuel'];
      const t = types[Math.floor(Math.random() * types.length)];
      const amt = 1 + Math.floor(Math.random() * 2);
      S[t] = (S[t] || 0) + amt;
      log(`Mara finds ${amt} ${t} on the way back.`, 'good');
      updateUI();
    }
    return;
  }
  const ev = eventQueue.shift();
  usedEvents.push(ev.id);
  showEvent(ev);
}

function showEvent(ev) {
  document.getElementById('modal-title').textContent = ev.title;
  document.getElementById('modal-text').textContent = ev.text;
  const ch = document.getElementById('modal-choices');
  ch.innerHTML = '';
  ev.choices.forEach(c => {
    const btn = document.createElement('button');
    btn.className = 'choice' + (c.type === 'good' ? ' good' : c.type === 'bad' ? ' bad' : '');
    btn.textContent = c.text;
    btn.onclick = () => {
      c.fn();
      closeModal();
      updateUI();
      if (!checkDeath()) setTimeout(nextEvent, 400);
    };
    ch.appendChild(btn);
  });
  const mc = document.getElementById('modal-scene');
  drawEventScene(mc, ev.id);
  const modal = document.getElementById('modal');
  modal.classList.add('open');
}

function closeModal() {
  document.getElementById('modal').classList.remove('open');
}

function decayStats() {
  ['mara', 'eli'].forEach(c => {
    const d = S[c];
    if (!d.alive) return;
    d.food = Math.max(0, d.food - 18);
    d.mood = Math.max(0, d.mood - (10 - S.shelter * 1.5));
    if (d.food <= 0) { d.hp = Math.max(0, d.hp - 12); log(c === 'mara' ? 'Mara is starving.' : 'Eli is starving.', 'danger'); }
  });
}

function endNight() {
  S.phase = 'day';
  S.day += 1;
  scavengeX = -40;
  log(`— Day ${S.day}. Still here. —`, 'amber');
  if (!checkDeath()) updateUI();
}

function checkDeath() {
  ['mara', 'eli'].forEach(c => {
    const d = S[c];
    if (d.alive && d.hp <= 0) {
      d.alive = false;
      log((c === 'mara' ? 'Mara' : 'Eli') + ' is gone.', 'danger');
    }
  });
  if (!S.mara.alive && !S.eli.alive) {
    setTimeout(showGameOver, 1200);
    return true;
  }
  return false;
}

function getMoralWord(m) {
  if (m >= 85) return 'Righteous';
  if (m >= 65) return 'Decent';
  if (m >= 40) return 'Compromised';
  if (m >= 20) return 'Hardened';
  return 'Lost';
}

function showGameOver() {
  const go = document.getElementById('gameover');
  go.classList.add('open');
  document.getElementById('goStats').innerHTML =
    `Survived <span>${S.day} days</span><br>` +
    `Moral standing: <span>${getMoralWord(S.moral)}</span><br>` +
    `Food left: <span>${S.food}</span>`;
}

function resetGame() {
  Object.assign(S, { day: 1, phase: 'day', moral: 80, food: 8, meds: 2, parts: 5, fuel: 3, shelter: 1,
    mara: { hp: 100, food: 80, mood: 90, alive: true },
    eli:  { hp: 100, food: 80, mood: 85, alive: true },
  });
  usedEvents = []; eventQueue = []; scavengeX = -40;
  document.getElementById('gameover').classList.remove('open');
  logEl.innerHTML = '<div class="log-line">The shelter holds.<br>Start again.</div>';
  updateUI();
}

updateUI();
</script>
