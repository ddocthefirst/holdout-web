<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>HOLDOUT</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #000;
  overflow: hidden;
  width: 100vw; height: 100vh;
  font-family: 'Courier New', monospace;
  display: flex; align-items: center; justify-content: center;
}
#wrap {
  position: relative;
  width: 420px; height: 100vh; max-height: 820px;
  overflow: hidden;
}
canvas#bg { position: absolute; inset: 0; width: 100%; height: 100%; }
#ui {
  position: absolute; inset: 0;
  display: flex; flex-direction: column;
  pointer-events: none;
}

/* HUD — compact overlay, no title bar */
#hud {
  padding: 8px 12px 4px;
  background: linear-gradient(to bottom, rgba(0,0,0,0.82) 70%, transparent);
}
.hud-title { display: none; } /* removed — saves 26px */
.hud-chars { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
.hud-char { display: flex; flex-direction: column; gap: 1px; }
.hud-name { font-size: 8px; letter-spacing: 1px; display: flex; justify-content: space-between; }
.hud-name .role { color: #445; }
.hud-name .name { color: #c8a96e; }
.hud-name.dead .name { color: #333; text-decoration: line-through; }
.bars { display: flex; flex-direction: column; gap: 1px; }
.bar-row { display: flex; align-items: center; gap: 3px; }
.bar-lbl { font-size: 7px; color: #445; width: 12px; }
.bar-bg { flex: 1; height: 2px; background: rgba(255,255,255,0.07); border-radius: 1px; }
.bar-f { height: 2px; border-radius: 1px; transition: width 0.5s ease; }
.b-hp  { background: #7ac74f; }
.b-fd  { background: #c8a96e; }
.b-md  { background: #4a9eff; }

/* Resources — inline, smaller */
#res {
  display: flex; justify-content: center; gap: 14px;
  padding: 3px 12px;
  background: rgba(0,0,0,0.38);
  font-size: 9px; pointer-events: none;
}
.rv { display: flex; align-items: center; gap: 3px; }
.ri { font-size: 10px; }
.rn { color: #e8e0d0; }

#gap { flex: 1; }

/* Moral + day — thinner */
#mbar {
  display: flex; align-items: center; gap: 6px;
  padding: 3px 12px;
  background: rgba(0,0,0,0.46);
}
.ml { font-size: 8px; color: #445; letter-spacing: 1px; width: 34px; }
.mo { flex: 1; height: 2px; background: rgba(233,69,96,0.35); border-radius: 1px; }
.mi { height: 2px; border-radius: 1px; background: #7ac74f; transition: width 0.6s; }
.dl { font-size: 8px; color: #4a9eff; letter-spacing: 1px; }

/* Log — single line, minimal */
#log {
  height: 22px; overflow: hidden;
  padding: 0 12px 4px;
  background: rgba(0,0,0,0.60);
  display: flex; align-items: flex-end;
}
.ll { font-size: 9px; color: #445; line-height: 1.5; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.ll.hi  { color: #888; }
.ll.good { color: #7ac74f; }
.ll.bad  { color: #e94560; }
.ll.amb  { color: #c8a96e; }
.ll.mor  { color: #a855f7; }

/* Actions panel — compact, 2 per row max */
#act {
  padding: 5px 10px;
  background: rgba(0,0,0,0.88);
  pointer-events: all;
  display: flex; flex-direction: column; gap: 4px;
}
.btn-row { display: flex; gap: 4px; }
.ab {
  flex: 1;
  background: transparent; border: 1px solid #1e1e22;
  color: #667; font-family: 'Courier New', monospace;
  font-size: 9px; padding: 5px 8px;
  cursor: pointer; text-align: left; line-height: 1.3;
  transition: border-color 0.15s, color 0.15s, background 0.15s;
}
.ab:hover:not(:disabled) { border-color: #c8a96e; color: #c8a96e; background: rgba(200,169,110,0.05); }
.ab:disabled { opacity: 0.2; cursor: default; }
.ab .c { display: block; font-size: 8px; color: #445; margin-top: 1px; }
.ab.full { flex: none; width: 100%; }
.ab.blue { border-color: #1a2840; color: #4a9eff; }
.ab.blue:hover:not(:disabled) { border-color: #4a9eff; background: rgba(74,158,255,0.06); color: #aac; }
.ab.purple { border-color: #221830; color: #a855f7; }
.ab.purple:hover:not(:disabled) { border-color: #a855f7; background: rgba(168,85,247,0.06); color: #cbb; }

/* Location picker overlay */
#picker {
  display: none; position: absolute; inset: 0;
  background: rgba(0,0,0,0.82);
  flex-direction: column; justify-content: flex-end;
  z-index: 5; pointer-events: all;
}
#picker.open { display: flex; }
#picker-inner {
  background: #07090f;
  border-top: 1px solid #2a2a3a;
  padding: 14px 13px 12px;
  transform: translateY(100%);
  transition: transform 0.3s cubic-bezier(0.22,1,0.36,1);
}
#picker.open #picker-inner { transform: translateY(0); }
.pick-title { font-size: 10px; color: #556; letter-spacing: 2px; margin-bottom: 10px; }
.pick-who { display: flex; gap: 5px; margin-bottom: 10px; }
.who-btn {
  flex: 1; background: transparent; border: 1px solid #222;
  color: #556; font-family: 'Courier New', monospace; font-size: 10px;
  padding: 7px 5px; cursor: pointer; text-align: center;
  transition: all 0.18s;
}
.who-btn.sel { border-color: #c8a96e; color: #c8a96e; background: rgba(200,169,110,0.08); }
.who-btn:hover { border-color: #c8a96e; color: #c8a96e; }
.loc-grid { display: flex; flex-direction: column; gap: 5px; margin-bottom: 10px; }
.loc-btn {
  background: transparent; border: 1px solid #1a1a2a;
  color: #667; font-family: 'Courier New', monospace; font-size: 10px;
  padding: 9px 11px; cursor: pointer; text-align: left;
  display: flex; justify-content: space-between; align-items: center;
  transition: all 0.18s;
}
.loc-btn:hover { border-color: #c8a96e; color: #e8e0d0; background: rgba(200,169,110,0.05); }
.loc-btn.sel { border-color: #c8a96e; background: rgba(200,169,110,0.07); color: #c8a96e; }
.loc-risk { font-size: 9px; color: #e94560; }
.loc-risk.low { color: #7ac74f; }
.loc-risk.med { color: #c8a96e; }
.confirm-btn {
  width: 100%; background: transparent; border: 1px solid #2a3a2a;
  color: #4a7a4a; font-family: 'Courier New', monospace; font-size: 10px;
  letter-spacing: 2px; padding: 9px; cursor: pointer;
  transition: all 0.18s;
}
.confirm-btn:hover { border-color: #7ac74f; color: #7ac74f; background: rgba(122,199,79,0.05); }
.confirm-btn:disabled { opacity: 0.2; cursor: default; }

/* Event modal */
#modal {
  display: none; position: absolute; inset: 0;
  background: rgba(0,0,0,0.82);
  flex-direction: column; justify-content: flex-end;
  z-index: 10; pointer-events: all;
}
#modal.open { display: flex; }
#mi {
  background: #07090f; border-top: 1px solid #c8a96e;
  padding: 14px 13px 12px;
  transform: translateY(100%);
  transition: transform 0.32s cubic-bezier(0.22,1,0.36,1);
}
#modal.open #mi { transform: translateY(0); }
#ms { width: 100%; height: 110px; display: block; margin-bottom: 10px; border: 1px solid #0d1020; }
#mt { font-size: 10px; color: #c8a96e; letter-spacing: 3px; margin-bottom: 6px; }
#mx { font-size: 10px; color: #667; line-height: 1.7; margin-bottom: 12px; }
.ch {
  width: 100%; background: transparent; border: 1px solid #1a1a28;
  color: #778; font-family: 'Courier New', monospace; font-size: 10px;
  padding: 9px 11px; text-align: left; cursor: pointer; line-height: 1.5;
  margin-bottom: 5px; transition: all 0.18s;
}
.ch:hover { border-color: #c8a96e; color: #e8e0d0; background: rgba(200,169,110,0.05); }
.ch.g { border-left: 2px solid #7ac74f; }
.ch.b { border-left: 2px solid #e94560; }

/* Game over */
#go {
  display: none; position: absolute; inset: 0;
  background: rgba(0,0,0,0.97);
  flex-direction: column; align-items: center; justify-content: center;
  z-index: 20; pointer-events: all;
}
#go.open { display: flex; }
#go h2 { color: #e94560; font-size: 20px; letter-spacing: 6px; margin-bottom: 20px; text-shadow: 0 0 30px rgba(233,69,96,0.5); }
#go .gs { color: #445; font-size: 10px; line-height: 2.4; text-align: center; margin-bottom: 24px; }
#go .gs span { color: #c8a96e; }
#rp {
  background: transparent; border: 1px solid #2a2a2a;
  color: #445; font-family: 'Courier New', monospace;
  font-size: 10px; letter-spacing: 2px; padding: 9px 26px; cursor: pointer;
}
#rp:hover { border-color: #c8a96e; color: #c8a96e; }
</style>

<body>
<div id="wrap">
<canvas id="bg"></canvas>

<div id="ui">
  <div id="hud">
    <div class="hud-title">H O L D O U T</div>
    <div class="hud-chars">
      <div class="hud-char">
        <div class="hud-name" id="mn"><span class="name">MARA</span><span class="role">scavenger</span></div>
        <div class="bars">
          <div class="bar-row"><span class="bar-lbl">HP</span><div class="bar-bg"><div class="bar-f b-hp" id="mhp" style="width:100%"></div></div></div>
          <div class="bar-row"><span class="bar-lbl">FD</span><div class="bar-bg"><div class="bar-f b-fd" id="mfd" style="width:80%"></div></div></div>

  <div id="res">

    <div class="rv"><span class="ri">🔩</span><span class="rn" id="rp">5</span></div>
    <div class="rv"><span class="ri">🔋</span><span class="rn" id="ru">3</span></div>

<!-- Location picker -->
<div id="picker">

<!-- Event modal -->

<script>
// ── State ────────────────────────────────────────────────────────────────
const S = {
  day: 1, phase: 'day', moral: 80,
  food: 8, meds: 2, parts: 5, fuel: 3, shelter: 1,
  mara: { hp: 100, fd: 80, md: 90, alive: true },
  eli:  { hp: 100, fd: 80, md: 85, alive: true },
};
let usedEvt = [], evtQ = [], T = 0;
let pickerWho = null, pickerLoc = null;
let scavX = -60, maraWalk = 0, eliWalk = 0;
let scavBgOffset = 0;       // background scroll position (pixels, increases over time)
let scavBgVariant = 0;      // which scav bg to show (0=scavBg1, 1=scavBg2)
let nightFade = 0; // 0=day, 1=night (smooth transition)

// Global sprite storage
const SPRITES = { mara: [], eli: [], action: [] };
let spritesReady = false;

// ── Asset images ─────────────────────────────────────────────────────────
const ASSETS = { parallax: null, baseLevels: null, spritesWalk: null, action2: null, main: null,
                  lv1: null, lv2: null, lv3: null, walkClean: null,
                  scavBg1: null, scavBg2: null,
                  scavNight1: null, scavNight2: null };
let assetsReady = 0;
const ASSETS_TOTAL = 13; // +4 scav backgrounds (2 day, 2 night)

// ── Walk clean sprite sheet (file_16, white bg, 4 rows × 8 frames, 1280×853) ──
// PIXEL-SCANNED exact values:
//   Row boundaries (content start→end): 49→198, 239→383, 434→577, 633→794
//   Frame separators at x: [0,142,299,458,621,773,926,1090,1239] → 8 frames
const CLEAN_ROWS = [
  { y:49,  h:149, frames:8 },  // Row 0: walk standard
  { y:239, h:145, frames:8 },  // Row 1: walk variant
  { y:434, h:144, frames:8 },  // Row 2: crouch walk
  { y:633, h:162, frames:8 },  // Row 3: run
];
// Exact frame x positions (from separator scan)
const CLEAN_FRAMES = [
  {x:1,    w:140}, {x:143,  w:155}, {x:300,  w:157}, {x:459,  w:161},
  {x:622,  w:150}, {x:774,  w:151}, {x:927,  w:162}, {x:1091, w:147},
];
const _cleanCache = new Map();

function drawCleanSprite(ctx, x, y, rowIdx, frameIdx, scale) {
  const row = CLEAN_ROWS[rowIdx];
  if (!ASSETS.walkClean || !row) return;
  const fi = Math.abs(frameIdx) % row.frames;
  const frame = CLEAN_FRAMES[fi];
  const targetH = scale || 100;
  const targetW = Math.round(frame.w * targetH / row.h);
  const key = `${rowIdx}_${fi}_${targetH}`;
  let cached = _cleanCache.get(key);
  if (!cached) {
    const oc = document.createElement('canvas');
    oc.width = targetW; oc.height = targetH;
    const octx = oc.getContext('2d');
    octx.drawImage(ASSETS.walkClean, frame.x, row.y, frame.w, row.h, 0, 0, targetW, targetH);
    const id = octx.getImageData(0, 0, targetW, targetH);
    const px = id.data;
    const W2 = targetW, H2 = targetH;

    // ── Edge-flood-fill to find background (exterior) white pixels ──────
    // Only removes white that's connected to the image border — preserves interior whites (eyes!)
    const visited = new Uint8Array(W2 * H2);
    const queue = [];
    const enqueue = (xi, yi) => {
      const idx = yi * W2 + xi;
      if (xi < 0 || xi >= W2 || yi < 0 || yi >= H2 || visited[idx]) return;
      const pi = idx * 4;
      const lum = px[pi]*0.299 + px[pi+1]*0.587 + px[pi+2]*0.114;
      if (lum > 190) { visited[idx] = 1; queue.push(xi, yi); }
    };
    // Seed from all 4 edges
    for (let xi = 0; xi < W2; xi++) { enqueue(xi, 0); enqueue(xi, H2-1); }
    for (let yi = 0; yi < H2; yi++) { enqueue(0, yi); enqueue(W2-1, yi); }
    // BFS
    for (let qi = 0; qi < queue.length; qi += 2) {
      const cx2 = queue[qi], cy2 = queue[qi+1];
      enqueue(cx2+1, cy2); enqueue(cx2-1, cy2);
      enqueue(cx2, cy2+1); enqueue(cx2, cy2-1);
    }
    // Apply: background-connected white → transparent; interior white (eyes) kept
    for (let i = 0; i < W2 * H2; i++) {
      if (visited[i]) {
        const pi = i * 4;
        const lum = px[pi]*0.299 + px[pi+1]*0.587 + px[pi+2]*0.114;
        if (lum > 210) px[pi+3] = 0;
        else if (lum > 170) px[pi+3] = Math.round(px[pi+3] * (210-lum)/40);
      }
    }
    octx.putImageData(id, 0, 0);
    cached = oc;
    _cleanCache.set(key, cached);
  }
  ctx.save();
  ctx.filter = 'brightness(1.3) contrast(1.1)';
  ctx.drawImage(cached, x - targetW/2, y - targetH);
  ctx.restore();
}

// ── Room pan state — updated each frame so room shifts with character movement ──
let roomPanX = 0; // current pan offset in pixels

// ── sprites-main.jpg (1280×853) — new smooth animations on blue chroma-key bg ──
// Layout (pixel-scanned dividers at y=3,224,261,429,455,632,818,835):
//   Row 0 (y=4,  h=219, 10 frames): walk cycle — smooth full walk
//   Row 1 (y=262,h=166, 10 frames): run / fast walk
//   Row 2 (y=456,h=175, 10 frames): crouch-walk / sneak
//   Backgrounds (y=633,h=184): 2 panoramas side by side (x=0,w=638 | x=642,w=638)
//   Bottom strip (y=818,h=34): 2 thin panoramas
const MAIN_ROWS = [
  { y: 4,   h: 219, frames: 10, label: 'walk' },
  { y: 262, h: 166, frames: 10, label: 'run' },
  { y: 456, h: 175, frames: 10, label: 'crouch' },
];
const MAIN_FRAME_W = Math.round(1280 / 10); // 128px per frame
const MAIN_BG = [
  { sx: 0,   sy: 633, sw: 638, sh: 184 },  // panorama A (left)
  { sx: 642, sy: 633, sw: 638, sh: 184 },  // panorama B (right)
];

// Chroma-key cache: sprites-main.jpg uses BLUE background (R<40,G<60,B>100,B>R*2)
const _mainCache = new Map();
function extractMainFrame(rowIdx, frameIdx, glow, targetH) {
  const row = MAIN_ROWS[rowIdx];
  if (!ASSETS.main || !row) return null;
  const fi = Math.min(frameIdx, row.frames - 1);
  const targetW = Math.round(MAIN_FRAME_W * targetH / row.h);
  const cacheKey = `${rowIdx}_${fi}_${targetH}`;
  let cached = _mainCache.get(cacheKey);
  if (cached) return cached;

  const oc = document.createElement('canvas');
  oc.width = targetW; oc.height = targetH;
  const octx = oc.getContext('2d');
  const sx = fi * MAIN_FRAME_W;
  octx.drawImage(ASSETS.main, sx, row.y, MAIN_FRAME_W, row.h, 0, 0, targetW, targetH);

  // Chroma-key: remove blue background (B dominant, B > R*2, B > G*1.5)
  const id = octx.getImageData(0, 0, targetW, targetH);
  const px = id.data;
  for (let i = 0; i < px.length; i += 4) {
    const r = px[i], g = px[i+1], b = px[i+2];
    if (b > 80 && b > r * 1.8 && b > g * 1.5) {
      // Blue background: fade by "blueness"
      const blueStrength = Math.min(1, (b - Math.max(r,g)*1.5) / 80);
      px[i+3] = Math.round(px[i+3] * (1 - blueStrength));
    }
  }
  // Keep original art colors — no tint
  octx.putImageData(id, 0, 0);

  _mainCache.set(cacheKey, oc);
  return oc;
}

function drawMainSprite(ctx, x, y, rowIdx, frameIdx, glow, scale) {
  const frame = extractMainFrame(rowIdx, frameIdx, glow, scale || 90);
  if (!frame) return;
  ctx.save();
  ctx.filter = 'brightness(1.8) contrast(1.15)';
  ctx.drawImage(frame, x - frame.width/2, y - frame.height);
  ctx.restore();
}

// ── sprites-action2.jpg (1280×853) layout:
//   Top ~75% = 3 rows of action sprites on BLACK bg (use screen blend = instant transparency)
//   Bottom ~25% = 4 panoramic backgrounds in 2×2 grid
//
// ACTION SPRITE ROWS (black bg — use globalCompositeOperation='screen')
//   Row 0 (y=0,   h=210): hammering, carrying planks, aiming, reading map, crouching, resting
//   Row 1 (y=215, h=210): seated crafting, aiming prone, cooking (green flame), scavenging, crouching, resting

// Draw an action sprite frame — extract to offscreen canvas, tint with glow color
// rowIdx: 0=active, 1=ground, 2=seated | frameIdx: 0-5
// x,y = center-bottom | scale = target height in px
const _actionCache = new Map();
function drawActionSprite(ctx, x, y, rowIdx, frameIdx, glow, scale) {
  const row = ACTION_ROWS[rowIdx];
  if (!ASSETS.action2 || !row) return;
  const fi = Math.min(frameIdx, row.frames - 1);
  const targetH = scale || 90;
  const targetW = Math.round(ACTION_FRAME_W * targetH / row.h);
  const cacheKey = `${rowIdx}_${fi}_${targetH}`;

  let tinted = _actionCache.get(cacheKey);
  if (!tinted) {
    // Extract frame to offscreen canvas, threshold dark bg, tint with glow color
    const oc = document.createElement('canvas');
    oc.width = targetW; oc.height = targetH;
    const octx = oc.getContext('2d');
    const sx = fi * ACTION_FRAME_W;

    // Draw frame scaled
    octx.drawImage(ASSETS.action2, sx, row.y, ACTION_FRAME_W, row.h, 0, 0, targetW, targetH);

    // Extract pixels: nearly-black bg → transparent
    const id = octx.getImageData(0, 0, targetW, targetH);
    const px = id.data;
    for (let i = 0; i < px.length; i += 4) {
      const lum = px[i]*0.299 + px[i+1]*0.587 + px[i+2]*0.114;
      if (lum < 28) {
        px[i+3] = 0; // black bg → fully transparent
      } else if (lum < 80) {
        px[i+3] = Math.round(255 * (lum - 28) / 52); // fade edge
      }
      // else: keep character pixels at full alpha
    }
    // Keep original art colors — no tint
    octx.putImageData(id, 0, 0);

    tinted = oc;
    _actionCache.set(cacheKey, tinted);
  }

  ctx.save();
  ctx.filter = 'brightness(1.8) contrast(1.15)';
  ctx.drawImage(tinted, x - targetW/2, y - targetH);
  ctx.restore();
}

function drawBg(t) {
  const dt = t - (drawBg._lt || t); drawBg._lt = t; T += dt * 0.001;
  const nf = nightFade; // 0=day, 1=night

  // ── DAY PHASE: room interior fills entire canvas, then draw chars ────────
  if (S.phase === 'day' && nightFade < 0.05) {
    drawShelterInterior();
    drawChars();
    return; // skip all outdoor rendering
  }

  // The outdoor scavenging scene draws its own full sky — skip blue sky/moon/stars
  // (those are only relevant for a shelter-window night view which we no longer use)

  // ── Outdoor scavenging background: dedicated art, character fixed in center ──
  // Per reference (file_24): character stays at fixed X, background scrolls behind.
  // Backgrounds (file_25/26): cracked cobblestone, ruined city, fire barrel, wrecked car.
  {
    // Night backgrounds for scavenging phase (dark, moonlit); day backgrounds otherwise
    const isNight = nightFade > 0.5;
    const pool = isNight
      ? [ASSETS.scavNight1, ASSETS.scavNight2, ASSETS.scavBg1, ASSETS.scavBg2]
      : [ASSETS.scavBg1, ASSETS.scavBg2, ASSETS.scavNight1, ASSETS.scavNight2];
    const scavImg = pool[scavBgVariant % 2] || pool.find(x => x);
    if (scavImg) {
      // Scale bg to fill canvas HEIGHT, maintain aspect → width ~1229px (extends off both sides)
      const scaleS = H / scavImg.naturalHeight;
      const bgW = Math.round(scavImg.naturalWidth * scaleS); // ~1229px
      const bgH = H;
      const maxPan = bgW - W; // ~809px of pan range

      // Scroll background left continuously (character "runs" through the world)
      scavBgOffset = (scavBgOffset + 0.8) % maxPan;
      const bx = -Math.round(scavBgOffset);

      cx.save();
      cx.drawImage(scavImg, 0, 0, scavImg.naturalWidth, scavImg.naturalHeight, bx, 0, bgW, bgH);
      // When we reach the end, seamlessly blend in the other image
      if (bx + bgW < W) {
        const scavImg2 = pool[(scavBgVariant + 1) % 2] || scavImg;
        cx.drawImage(scavImg2, 0, 0, scavImg2.naturalWidth, scavImg2.naturalHeight, bx + bgW, 0, bgW, bgH);
      }
      cx.restore();
    } else {
      // Fallback: amber sky + procedural silhouettes
      const sky = cx.createLinearGradient(0, 0, 0, H * 0.72);
      sky.addColorStop(0, '#0a0604'); sky.addColorStop(0.5, '#5a2c0a'); sky.addColorStop(1, '#a06018');
      cx.fillStyle = sky; cx.fillRect(0, 0, W, Math.round(H * 0.72));
      cx.fillStyle = '#1a0c04';
      BLD_FAR.forEach(b => cx.fillRect(b.x, Math.round(H*0.72) - b.h, b.w, b.h));
    }
  }

  // Characters drawn on top of scavenging scene
  drawChars();

  // Night fade
  if (S.phase === 'night' && nightFade < 1) nightFade = Math.min(1, nightFade + 0.008);
  if (S.phase === 'day'  && nightFade > 0) nightFade = Math.max(0, nightFade - 0.012);
}

function drawShelterInterior() {
  const lvl = Math.min(2, Math.max(0, (S.shelter || 1) - 1));
  const img = [ASSETS.lv1, ASSETS.lv2, ASSETS.lv3][lvl];

  if (img) {
    // Scale to cover full canvas height, maintain native aspect ratio
    // Image is 1280×853 → scale to canvas H=820 → displayW=1229px (extends 809px off right)
    const scale = H / img.naturalHeight;
    const dw = Math.round(img.naturalWidth * scale);  // ~1229px
    const dh = H;                                     // full canvas height

    // Pan based on character positions — creates "moving through room" illusion
    // Target pan: character near left → show left side of room; near right → show right
    // Room pans gently over time (not tied to scavX since char is now fixed in scav)
    const targetPan = -Math.round(((Math.sin(T * 0.04) * 0.5 + 0.5)) * (dw - W) * 0.6);
    const clampedPan = Math.max(-(dw - W), Math.min(0, targetPan));
    // Smooth pan
    roomPanX += (clampedPan - roomPanX) * 0.03;

    cx.save();
    // Draw room image at native aspect, panned
    cx.drawImage(img, 0, 0, img.naturalWidth, img.naturalHeight,
                 Math.round(roomPanX), 0, dw, dh);
    cx.restore();
  } else {
    // Fallback dark room
    cx.fillStyle = '#07080d';
    cx.fillRect(0, 0, W, H);
  }
}

function drawChars() {
  const isNight = S.phase === 'night';
  const scaver = pickerWho;

  if (!isNight) {
    // ── DAY PHASE: show action sprites at shelter ──────────────────────
    // Mara: hammering/building (row 0, frame 0) — animate between frame 0-1
    // Eli: seated crafting (row 2) — animate between frame 0-2
    const actionT = Math.floor(T * 2) % 6;

    // DAY: two characters in room — sprite frames ≈1:1 aspect, so height controls width too
    // At charH=160px → charW≈160px → two chars at x=100,x=310 fit cleanly on 420px canvas
    const dayFloor = GY + 8;  // stand on the ground line
    const charH = 160;
    // Idle animation: ~0.6 cycles/sec = gentle sway (T is in seconds)
    if (S.mara.alive) {
      const mFr = Math.floor(T * 0.7) % 8;
      if (ASSETS.walkClean) drawCleanSprite(cx, 105, dayFloor, 0, mFr, charH);
      else charSprite(cx, 105, dayFloor, maraWalk, '#c8a96e', SPRITES.mara, 'mara');
    }
    if (S.eli.alive) {
      const eFr = (Math.floor(T * 0.7) + 4) % 8;
      if (ASSETS.walkClean) drawCleanSprite(cx, 315, dayFloor, 0, eFr, charH);
      else charSprite(cx, 315, dayFloor, eliWalk*0.5, '#4a9eff', SPRITES.eli, 'eli');
    }
    maraWalk += 0.01; eliWalk += 0.01;
  } else {
    // ── NIGHT: scavenger walks across screen, other waits at home ───────
    // Scavenging: solo character, larger than base (single char so more room)
    // charH=180 → charW≈180px, leaves room on both sides of 420px canvas
    const scavCharH = 180;
    const scavFloor = Math.round(H * 0.72) + 10; // outdoor ground horizon
    const walkFn = (x, glow, wt) => {
      // Use run row (3) when moving fast, walk (0) otherwise, crouch (2) when sneaking
      const speed = Math.abs(scavX - (scavX || W/2));
      const rowIdx = nightFade > 0.8 ? 2 : (wt > 0.4 ? 3 : 0);
      const fi = Math.abs(Math.floor(wt * 8)) % CLEAN_ROWS[rowIdx < CLEAN_ROWS.length ? rowIdx : 0].frames;
      if (ASSETS.walkClean) {
        drawCleanSprite(cx, x, scavFloor, rowIdx < CLEAN_ROWS.length ? rowIdx : 0, fi, scavCharH);
      } else if (ASSETS.main) {
        const mRowIdx = nightFade > 0.6 ? 2 : 0;
        const mFi = Math.abs(Math.floor(wt * 10)) % MAIN_ROWS[mRowIdx].frames;
        drawMainSprite(cx, x, GY, mRowIdx, mFi, glow, 92);
      } else {
        charSprite(cx, x, GY, wt, glow, glow === '#c8a96e' ? SPRITES.mara : SPRITES.eli,
                   glow === '#c8a96e' ? 'mara' : 'eli');
      }
    };

    // Character is FIXED in center of screen — background scrolls (per file_24 reference)
    // Walk speed: ~0.018/frame @ 60fps = ~1.1 full cycles/sec (natural walking pace)
    const charCenterX = Math.round(W * 0.42);
    if (scaver !== 'eli' && S.mara.alive) {
      maraWalk += 0.018;
      walkFn(charCenterX, '#c8a96e', maraWalk);
    }
    if (scaver === 'eli' && S.eli.alive) {
      eliWalk += 0.018;
      walkFn(charCenterX, '#4a9eff', eliWalk);
    }
    if (scaver === 'both') {
      maraWalk += 0.018; eliWalk += 0.018;
      if (S.mara.alive) walkFn(charCenterX - 20, '#c8a96e', maraWalk);
      if (S.eli.alive)  walkFn(charCenterX + 20, '#4a9eff', eliWalk);
    }
    const home = scaver === 'mara' ? 'eli' : scaver === 'eli' ? 'mara' : null;
    if (home && S[home].alive) {
      const homeGlow = home === 'mara' ? '#c8a96e' : '#4a9eff';
      if (ASSETS.action2) {
        drawActionSprite(cx, 55, GY, 2, 0, homeGlow, 72);
      } else {
        charSmall(cx, 58, GY - 50);
      }
    }
  }
}

// Chunky silhouette character — round head, dot eyes, backpack, boots
// style: 'mara' (longer hair) or 'eli' (shorter, stockier)
function char(ctx, x, y, walk, glow, style) {
  const t = walk;
  const bob   = Math.sin(t*2) * 1.8;
  const legL  = Math.sin(t*2) * 13;   // leg swing angle deg
  const legR  = -Math.sin(t*2) * 13;
  const armL  = -Math.sin(t*2) * 10;
  const armR  = Math.sin(t*2) * 10;
  const lean  = Math.sin(t*2) * 1.2;  // slight body lean

  ctx.save();
  ctx.translate(x, y + bob);
  ctx.shadowColor = glow;

  // ── Backpack (behind body) ──
  ctx.shadowBlur = 4;
  ctx.fillStyle = '#000';
  ctx.save();
  ctx.translate(-10, -46);
  ctx.beginPath();
  ctx.roundRect(-7, -8, 13, 22, 3);
  ctx.fill();
  // pack strap line
  ctx.strokeStyle = 'rgba(255,255,255,0.06)';
  ctx.lineWidth = 1.5;
  ctx.beginPath(); ctx.moveTo(-2,-8); ctx.lineTo(-2,14); ctx.stroke();
  ctx.restore();

  // ── Legs ──
  ctx.shadowBlur = 5;
  ctx.fillStyle = '#000';
  // Left leg
  ctx.save();
  ctx.translate(-5, -16);
  ctx.rotate(legL * Math.PI/180);
  // thigh
  ctx.fillRect(-5, 0, 9, 16);
  ctx.save();
  ctx.translate(0, 16);
  ctx.rotate(-legL * 0.5 * Math.PI/180);
  // shin
  ctx.fillRect(-4, 0, 8, 14);
  // boot
  ctx.save(); ctx.translate(0, 14);
  ctx.beginPath();
  ctx.roundRect(-5, 0, 12, 6, 2);
  ctx.fill();
  ctx.restore();
  ctx.restore();
  ctx.restore();

  // Right leg
  ctx.save();
  ctx.translate(5, -16);
  ctx.rotate(legR * Math.PI/180);
  ctx.fillRect(-4, 0, 9, 16);
  ctx.save();
  ctx.translate(0, 16);
  ctx.rotate(-legR * 0.5 * Math.PI/180);
  ctx.fillRect(-4, 0, 8, 14);
  ctx.save(); ctx.translate(0, 14);
  ctx.beginPath(); ctx.roundRect(-5, 0, 12, 6, 2); ctx.fill();
  ctx.restore();
  ctx.restore();
  ctx.restore();

  // ── Body / torso ──
  ctx.shadowBlur = 8;
  ctx.save();
  ctx.rotate(lean * Math.PI/180);
  ctx.beginPath();
  ctx.roundRect(-9, -46, 18, 32, 4);
  ctx.fill();
  ctx.restore();

  // ── Arms ──
  ctx.shadowBlur = 4;
  // Left arm
  ctx.save();
  ctx.translate(-10, -44);
  ctx.rotate((armL - 8) * Math.PI/180);
  ctx.beginPath(); ctx.roundRect(-3, 0, 6, 18, 3); ctx.fill();
  ctx.restore();
  // Right arm
  ctx.save();
  ctx.translate(10, -44);
  ctx.rotate((armR + 8) * Math.PI/180);
  ctx.beginPath(); ctx.roundRect(-3, 0, 6, 18, 3); ctx.fill();
  ctx.restore();

  // ── Head ──
  ctx.shadowBlur = 14;
  ctx.save();
  ctx.translate(0, -62);
  // Main head — round blobby
  ctx.beginPath();
  ctx.arc(0, 0, 16, 0, Math.PI*2);
  ctx.fill();
  ctx.shadowBlur = 0;

  // Hair
  if (style === 'mara') {
    // Longer hair — sweeps back
    ctx.beginPath();
    ctx.moveTo(-14, -4);
    ctx.quadraticCurveTo(-20, 4, -18, 16);
    ctx.quadraticCurveTo(-16, 22, -10, 20);
    ctx.quadraticCurveTo(-6, 18, -4, 12);
    ctx.lineTo(-16, 8);
    ctx.fill();
    // Hair top tuft
    ctx.beginPath();
    ctx.moveTo(-10, -14);
    ctx.quadraticCurveTo(-16, -22, -6, -20);
    ctx.fill();
  } else {
    // Eli — shorter crop, slightly wider head
    ctx.beginPath();
    ctx.arc(0, 0, 17, Math.PI*0.9, Math.PI*2.1); // wider
    ctx.fill();
    ctx.beginPath();
    ctx.moveTo(-14, -8);
    ctx.quadraticCurveTo(-12, -22, 2, -20);
    ctx.quadraticCurveTo(10, -18, 8, -10);
    ctx.fill();
  }

  // White dot eyes
  ctx.fillStyle = 'rgba(255,255,255,0.9)';
  ctx.shadowColor = 'rgba(255,255,255,0.8)'; ctx.shadowBlur = 4;
  ctx.beginPath(); ctx.arc(-5, 2, 3.5, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(5, 2, 3.5, 0, Math.PI*2); ctx.fill();

  // Eye shine
  ctx.fillStyle = '#000';
  ctx.shadowBlur = 0;
  ctx.beginPath(); ctx.arc(-4.2, 1.2, 1.5, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(5.8, 1.2, 1.5, 0, Math.PI*2); ctx.fill();

  ctx.restore(); // head
  ctx.restore(); // main
}

function charSmall(ctx, x, y) {
  const b = Math.sin(T*1.5)*0.8;
  ctx.save(); ctx.translate(x, y+b);
  ctx.fillStyle = '#000'; ctx.shadowColor = '#4a9eff'; ctx.shadowBlur = 6;
  // body
  ctx.beginPath(); ctx.roundRect(-5,-22,10,14,3); ctx.fill();
  // head
  ctx.beginPath(); ctx.arc(0,-28,7,0,Math.PI*2); ctx.fill();
  // eyes
  ctx.fillStyle='rgba(255,255,255,0.9)'; ctx.shadowBlur=2;
  ctx.beginPath(); ctx.arc(-2,-27,1.5,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(2,-27,1.5,0,Math.PI*2); ctx.fill();
  ctx.shadowBlur=0; ctx.restore();
}

// Cached tinted frame canvases
const tintCache = new Map();

function charSprite(ctx, x, y, walk, glow, spriteArr, style) {
  if (!spriteArr || !spriteArr.length) {
    char(ctx, x, y, walk, glow, style); // fallback
    return;
  }
  const fi = Math.abs(Math.floor(walk * 8)) % spriteArr.length;
  const f = spriteArr[fi];
  const targetH = 90;
  const scale = targetH / f.height;
  const dw = Math.round(f.width * scale);
  const dh = targetH;

  // Draw sprite with original art colors — no tint, no glow
  const cacheKey = f.width + '_' + f.height + '_' + fi;
  let cached = tintCache.get(cacheKey);
  if (!cached) {
    cached = document.createElement('canvas');
    cached.width = dw; cached.height = dh;
    cached.getContext('2d').drawImage(f, 0, 0, dw, dh);
    tintCache.set(cacheKey, cached);
  }

  ctx.save();
  ctx.filter = 'brightness(1.8) contrast(1.15)';
  ctx.drawImage(cached, x - dw/2, y - dh);
  ctx.restore();
}

// ── Sprite loading & extraction ───────────────────────────────────────────
function loadSprites(callback) {
  const img = new Image();
  img.onload = () => {
    extractSprites(img);
    spritesReady = true;
    callback();
  };
  img.onerror = () => { spritesReady = false; callback(); }; // fallback to procedural
  img.src = 'assets/sprites-walk.jpg';
}

function extractSprites(img) {
  const oc = document.createElement('canvas');
  oc.width = img.width; oc.height = img.height;
  const octx = oc.getContext('2d');
  octx.drawImage(img, 0, 0);
  const full = octx.getImageData(0, 0, img.width, img.height);
  const px = full.data;
  const W = img.width, H = img.height;

  // Find horizontal bands (rows of characters)
  const rowDark = [];
  for (let y = 0; y < H; y++) {
    let dark = 0;
    for (let x = 0; x < W; x++) {
      const i = (y*W+x)*4;
      if (px[i]*0.299 + px[i+1]*0.587 + px[i+2]*0.114 < 160) dark++;
    }
    rowDark.push(dark);
  }
  const minDark = W * 0.03;
  const bands = [];
  let inBand = false, bStart = 0;
  for (let y = 0; y < H; y++) {
    if (rowDark[y] > minDark && !inBand) { inBand = true; bStart = y; }
    if (rowDark[y] < minDark * 0.3 && inBand) {
      inBand = false;
      if (y - bStart > 40) bands.push([Math.max(0,bStart-4), Math.min(H,y+4)]);
    }
  }

  // Extract frames from each band
  const destinations = [SPRITES.eli, SPRITES.mara, SPRITES.action];
  bands.slice(0,3).forEach(([y0,y1], bi) => {
    const bH = y1-y0;
    const colDark = [];
    for (let x = 0; x < W; x++) {
      let dark = 0;
      for (let y = y0; y < y1; y++) {
        const i = (y*W+x)*4;
        if (px[i]*0.299+px[i+1]*0.587+px[i+2]*0.114 < 160) dark++;
      }
      colDark.push(dark);
    }
    const colBands = [];
    let inCol = false, cStart = 0;
    const minCol = bH * 0.04;
    for (let x = 0; x < W; x++) {
      if (colDark[x] > minCol && !inCol) { inCol = true; cStart = x; }
      if (colDark[x] < minCol*0.3 && inCol) {
        inCol = false;
        if (x - cStart > 30) colBands.push([Math.max(0,cStart-4), Math.min(W,x+4)]);
      }
    }
    colBands.slice(0,8).forEach(([x0,x1]) => {
      const fw=x1-x0, fh=bH;
      const fc=document.createElement('canvas');
      fc.width=fw; fc.height=fh;
      const fctx=fc.getContext('2d');
      const fd=new ImageData(fw,fh);
      for (let fy=0;fy<fh;fy++) for (let fx=0;fx<fw;fx++) {
        const si=((y0+fy)*W+(x0+fx))*4;
        const lum=px[si]*0.299+px[si+1]*0.587+px[si+2]*0.114;
        const di=(fy*fw+fx)*4;
        if (lum < 175) {
          fd.data[di]=fd.data[di+1]=fd.data[di+2]=0;
          const darkness=1-lum/175;
          fd.data[di+3]=Math.round(255*darkness*darkness);
        }
      }
      fctx.putImageData(fd,0,0);
      destinations[bi].push(fc);
    });
  });
}

// ── Helpers ───────────────────────────────────────────────────────────────
function lerp3(a, b, t) { return a.map((v,i) => Math.round(v + (b[i]-v)*t)); }
function rgb([r,g,b]) { return `rgb(${r},${g},${b})`; }
function $(id) { return document.getElementById(id); }
function set(id, v) { const e=$(id); if(e) e.textContent = v; }
function bar(id, v) { const e=$(id); if(e) e.style.width = Math.max(0,Math.min(100,v))+'%'; }

function updateUI() {
  bar('mhp', S.mara.hp); bar('mfd', S.mara.fd); bar('mmd', S.mara.md);
  bar('ehp', S.eli.hp);  bar('efd', S.eli.fd);  bar('emd', S.eli.md);
  set('rf', S.food); set('rm', S.meds); set('rp', S.parts); set('ru', S.fuel);
  set('rs', 'Lv' + S.shelter);
  set('dl', 'DAY ' + S.day);
  bar('mb', S.moral);
  set('mw', mword(S.moral));
  $('mw').style.color = S.moral>=65?'#7ac74f':S.moral>=35?'#c8a96e':'#e94560';
  $('mn').className = 'hud-name' + (S.mara.alive?'':' dead');
  $('en').className = 'hud-name' + (S.eli.alive?'':' dead');
  // Phase button
  const pb = $('phaseBtn');
  if (S.phase === 'day') {
    pb.textContent = '▸ SEND OUT TO SCAVENGE';
    pb.className = 'ab full purple';
  } else {
    pb.textContent = '▸ RETURN — END NIGHT';
    pb.className = 'ab full blue';
    pb.onclick = endNight;
  }
}

const logEl = $('log');
function log(msg, cls='') {
  // Single-line log — just update the one line in place
  const line = $('l0') || logEl.querySelector('.ll');
  if (line) { line.className = 'll hi' + (cls?' '+cls:''); line.textContent = msg; }
}

function mword(m) {
  if (m>=85) return 'RIGHTEOUS';
  if (m>=65) return 'DECENT';
  if (m>=40) return 'COMPROMISED';
  if (m>=20) return 'HARDENED';
  return 'LOST';
}

// ── Day actions ───────────────────────────────────────────────────────────
function feedBoth() {
  if (S.food<2) { log('Not enough food.','bad'); return; }
  S.food -= 2;
  if (S.mara.alive) S.mara.fd = Math.min(100, S.mara.fd+35);
  if (S.eli.alive)  S.eli.fd  = Math.min(100, S.eli.fd +35);
  log('Both eat. The hunger fades briefly.','amb'); updateUI();
}
function heal(c) {
  if (!S[c].alive) { log('They\'re gone.','bad'); return; }
  if (S.meds<1) { log('No meds.','bad'); return; }
  S.meds -= 1; S[c].hp = Math.min(100, S[c].hp+30);
  log((c==='mara'?'Mara':'Eli')+' treated.','good'); updateUI();
}
function build() {
  if (!S.eli.alive) { log('Eli isn\'t here.','bad'); return; }
  if (S.parts<2) { log('Not enough parts.','bad'); return; }
  S.parts -= 2; S.shelter = Math.min(5, S.shelter+1);
  S.eli.md = Math.min(100, S.eli.md+12);
  log('Eli reinforces the walls. Shelter Lv'+S.shelter+'.','good'); updateUI();
}
function doRest() {
  if (S.mara.alive) S.mara.md = Math.min(100, S.mara.md+18);
  if (S.eli.alive)  S.eli.md  = Math.min(100, S.eli.md +18);
  decay(); if (!checkDead()) updateUI();
}

// ── Location picker ────────────────────────────────────────────────────────
function openPicker() {
  if (S.phase === 'night') return;
  const aliveChars = [S.mara.alive && 'mara', S.eli.alive && 'eli'].filter(Boolean);
  if (!aliveChars.length) return;
  // reset
  pickerWho = null; pickerLoc = null;
  ['whoMara','whoEli','whoBoth','locA','locH','locM'].forEach(id => $(id) && $(id).classList.remove('sel'));
  $('goBtn').disabled = true;
  // disable unavailable who buttons
  $('whoMara').disabled = !S.mara.alive;
  $('whoEli').disabled  = !S.eli.alive;
  $('whoBoth').disabled = !(S.mara.alive && S.eli.alive);
  $('picker').classList.add('open');
}
function setWho(w) {
  pickerWho = w;
  ['whoMara','whoEli','whoBoth'].forEach(id => $(id).classList.remove('sel'));
  const map = {mara:'whoMara',eli:'whoEli',both:'whoBoth'};
  $(map[w]).classList.add('sel');
  checkCanConfirm();
}
function setLoc(l) {
  pickerLoc = l;
  ['locA','locH','locM'].forEach(id => $(id).classList.remove('sel'));
  const map = {apartment:'locA',hardware:'locH',clinic:'locM'};
  $(map[l]).classList.add('sel');
  checkCanConfirm();
}
function checkCanConfirm() {
  $('goBtn').disabled = !(pickerWho && pickerLoc);
}
function confirmScavenge() {
  $('picker').classList.remove('open');
  startNight();
}

// ── Night ─────────────────────────────────────────────────────────────────
const EVENTS = {
  apartment: [
    { id:'stranger', title:'A KNOCK AT THE DOOR',
      text:'A woman and child in the rain. Hollow eyes. They found you somehow.',
      choices:[
        {t:'Let them in.',cls:'g',fn(){S.food=Math.max(0,S.food-3);S.moral=Math.min(100,S.moral+14);log('You move aside. The child stops crying.','good');}},
        {t:'Turn them away.',cls:'b',fn(){S.moral=Math.max(0,S.moral-20);S.eli.md=Math.max(0,S.eli.md-22);log('Eli won\'t look at you.','mor');}},
        {t:'Give one meal and point east.',cls:'',fn(){S.food=Math.max(0,S.food-1);S.moral=Math.max(0,S.moral-4);log('One meal. Maybe enough.','');}},
      ]},
    { id:'food_find', title:'OLD PANTRY',
      text:'A boarded-up apartment, untouched since the beginning. Food in the back.',
      choices:[
        {t:'Take it all.',cls:'',fn(){S.food+=6;log('Six rations. The apartment smells like someone left in a hurry.','amb');}},
        {t:'Take half — leave a note.',cls:'g',fn(){S.food+=3;S.moral=Math.min(100,S.moral+5);log('Three rations. You leave the pen.','good');}},
      ]},
  ],
  hardware: [
    { id:'cache', title:'SOMEONE WAS HERE FIRST',
      text:'Three people in the corner of the hardware store. They were here first.',
      choices:[
        {t:'Take only what\'s unclaimed.',cls:'g',fn(){S.parts+=2;S.moral=Math.min(100,S.moral+6);log('You leave the good stuff.','good');}},
        {t:'Take everything.',cls:'b',fn(){S.parts+=8;S.moral=Math.max(0,S.moral-24);log('Nobody fights back. That\'s almost worse.','bad');}},
        {t:'Offer food for parts.',cls:'',fn(){if(S.food>=2){S.food-=2;S.parts+=4;log('Fair trade.','');}else log('Nothing to offer.','bad');}},
      ]},
    { id:'raiders', title:'THREE IN THE STREET',
      text:'Armed figures circling the block. Neighbors\' light is still on.',
      choices:[
        {t:'Warn the neighbors.',cls:'g',fn(){S.moral=Math.min(100,S.moral+10);log('They get out in time.','good');}},
        {t:'Stay hidden.',cls:'',fn(){S.mara.hp=Math.max(0,S.mara.hp-8);log('Mara stays low for two hours. Her back aches.','');}},
        {t:'Burn fuel as distraction.',cls:'',fn(){S.fuel=Math.max(0,S.fuel-2);S.food+=3;log('The fire pulls them away.','good');}},
      ]},
  ],
  clinic: [
    { id:'medicine', title:'THE CLINIC',
      text:'Meds on the shelf. A note taped to the cabinet: "please leave some."',
      choices:[
        {t:'Take half. Leave the rest.',cls:'g',fn(){S.meds+=2;S.moral=Math.min(100,S.moral+10);log('Two bottles. The note stays.','good');}},
        {t:'Take it all.',cls:'b',fn(){S.meds+=5;S.moral=Math.max(0,S.moral-16);log('The note tears when you close the cabinet.','bad');}},
      ]},
    { id:'wounded', title:'SOMEONE NEEDS HELP',
      text:'A man collapsed in the clinic hallway. Still breathing. No supplies left.',
      choices:[
        {t:'Carry him outside — find help.',cls:'g',fn(){S.mara.hp=Math.max(0,S.mara.hp-5);S.moral=Math.min(100,S.moral+12);log('You lose an hour. His eyes open when you lay him down.','good');}},
        {t:'Leave him. You can\'t carry this.',cls:'b',fn(){S.moral=Math.max(0,S.moral-14);log('You step over him. His breathing fades behind you.','bad');}},
      ]},
  ],
};

let nightEvts = [];
function startNight() {
  S.phase = 'night';
  scavX = S.phase === 'night' ? W * 0.35 : -60;
  decay();
  if (checkDead()) return;
  // Build event queue from chosen location
  const pool = (EVENTS[pickerLoc] || []).filter(e => !usedEvt.includes(e.id));
  if (!pool.length) { usedEvt = usedEvt.filter(id => !EVENTS[pickerLoc].map(e=>e.id).includes(id)); }
  const src = pool.length ? pool : EVENTS[pickerLoc];
  nightEvts = [...src].sort(()=>Math.random()-0.5).slice(0,2);
  const who = pickerWho === 'both' ? 'Mara and Eli head out' : pickerWho === 'mara' ? 'Mara heads out' : 'Eli heads out';
  log(`— Night falls. ${who}. —`, 'amb');
  updateUI();
  setTimeout(nextEvt, 800);
}
function nextEvt() {
  if (!nightEvts.length) {
    // Passive loot based on location
    const lootMap = { apartment: ['food','food'], hardware: ['parts','fuel'], clinic: ['meds','meds'] };
    const options = lootMap[pickerLoc] || ['food'];
    const which = options[Math.floor(Math.random()*options.length)];
    const amt = 1 + Math.floor(Math.random()*2);
    S[which] = (S[which]||0) + amt;
    log(`Found ${amt} ${which} heading back.`, 'good');
    updateUI();
    // Injury risk at clinic
    if (pickerLoc === 'clinic' && Math.random() < 0.35) {
      const who = pickerWho === 'eli' ? 'eli' : 'mara';
      if (S[who].alive) { S[who].hp = Math.max(0, S[who].hp - 15); log('Came back injured.','bad'); updateUI(); }
    }
    return;
  }
  const ev = nightEvts.shift();
  usedEvt.push(ev.id);
  showEvt(ev);
}

function showEvt(ev) {
  $('mt').textContent = ev.title;
  $('mx').textContent = ev.text;
  const ch = $('mc'); ch.innerHTML = '';
  ev.choices.forEach(c => {
    const b = document.createElement('button');
    b.className = 'ch' + (c.cls?' '+c.cls:'');
    b.textContent = c.t;
    b.onclick = () => { c.fn(); closeModal(); updateUI(); if(!checkDead()) setTimeout(nextEvt, 400); };
    ch.appendChild(b);
  });
  drawModalScene(ev.id);
  $('modal').classList.add('open');
}
function closeModal() { $('modal').classList.remove('open'); }

function endNight() {
  if (S.phase !== 'night') return;
  S.phase = 'day';
  S.day++;
  scavX = -60;
  log(`— Day ${S.day}. Still here. —`, 'amb');
  $('phaseBtn').onclick = openPicker;
  if (!checkDead()) updateUI();
}

// ── Stat decay ────────────────────────────────────────────────────────────
function decay() {
  const bonus = S.shelter * 1.5;
  const moodDrop = Math.max(0, 12 - bonus);
  ['mara','eli'].forEach(c => {
    const d = S[c]; if (!d.alive) return;
    d.fd = Math.max(0, d.fd - 16);
    d.md = Math.max(0, d.md - moodDrop);
    if (d.fd <= 0) { d.hp = Math.max(0, d.hp - 12); log((c==='mara'?'Mara':'Eli')+' is starving.','bad'); }
  });
}
function checkDead() {
  ['mara','eli'].forEach(c => {
    if (S[c].alive && S[c].hp <= 0) { S[c].alive = false; log((c==='mara'?'Mara':'Eli')+' is gone.','bad'); }
  });
  if (!S.mara.alive && !S.eli.alive) { setTimeout(showGO, 1200); return true; }
  return false;
}

// ── Modal scene illustrations ─────────────────────────────────────────────
function drawModalScene(id) {
  const cv2 = $('ms'), ctx2 = cv2.getContext('2d');
  const w = cv2.width, h = cv2.height, gy = h*0.8;
  ctx2.fillStyle='#030508'; ctx2.fillRect(0,0,w,h);
  // Night sky strip
  const sk=ctx2.createLinearGradient(0,0,0,gy);
  sk.addColorStop(0,'#020510'); sk.addColorStop(1,'#060c1a');
  ctx2.fillStyle=sk; ctx2.fillRect(0,0,w,gy);
  ctx2.fillStyle='#020305'; ctx2.fillRect(0,gy,w,h-gy);
  // Buildings silhouette
  [[0,50,60],[80,35,75],[160,42,55],[240,38,80],[310,30,65],[360,45,90]].forEach(([x,w2,hh])=>{
    ctx2.fillStyle='#020408'; ctx2.fillRect(x,gy-hh,w2,hh);
  });
  // Rain
  ctx2.strokeStyle='rgba(120,160,240,0.2)'; ctx2.lineWidth=1;
  for(let i=0;i<22;i++){const rx=((i*23+T*20)%w),ry=((i*37+T*35)%gy);ctx2.beginPath();ctx2.moveTo(rx,ry);ctx2.lineTo(rx-1,ry+7);ctx2.stroke();}
  // Scene-specific art
  const scenes = {
    stranger: ()=>{
      // Door ajar with amber glow
      ctx2.fillStyle='#01020a'; ctx2.fillRect(w*.42,h*.18,w*.16,h*.62);
      const g=ctx2.createRadialGradient(w*.5,h*.5,0,w*.5,h*.5,55);
      g.addColorStop(0,'rgba(200,140,50,0.38)');g.addColorStop(1,'transparent');
      ctx2.fillStyle=g; ctx2.fillRect(0,0,w,h);
      ctx2.strokeStyle='#0f1520'; ctx2.lineWidth=3; ctx2.strokeRect(w*.42,h*.18,w*.16,h*.62);
      fig(ctx2,w*.28,gy,'#c8a96e',0.55,'female'); fig(ctx2,w*.19,gy,'#4a9eff',0.38,'male');
    },
    food_find: ()=>{
      // Shelves, tins
      for(let i=0;i<3;i++){ctx2.fillStyle='#080d18';ctx2.fillRect(w*.1,h*.2+i*h*.2,w*.8,h*.18);}
      [w*.2,w*.35,w*.55,w*.72].forEach(bx=>{ ctx2.fillStyle='#000';ctx2.shadowColor='#c8a96e';ctx2.shadowBlur=4; ctx2.fillRect(bx,gy-24,12,18); ctx2.shadowBlur=0; });
    },
    cache: ()=>{
      ctx2.fillStyle='#020408'; ctx2.fillRect(w*.08,h*.15,w*.84,h*.65);
      for(let i=1;i<4;i++){ctx2.strokeStyle='#080f1e';ctx2.lineWidth=2;ctx2.beginPath();ctx2.moveTo(w*.08,h*(0.15+i*.18));ctx2.lineTo(w*.92,h*(0.15+i*.18));ctx2.stroke();}
      [w*.58,w*.7,w*.8].forEach((fx,fi)=>fig(ctx2,fx,gy,'#4a9eff',fi===1?0.32:0.42));
      fig(ctx2,w*.2,gy,'#c8a96e',0.55,'female');
    },
    raiders: ()=>{
      [w*.55,w*.68,w*.8].forEach(rx=>{ fig(ctx2,rx,gy,'#e94560',0.45); ctx2.fillStyle='#000';ctx2.shadowColor='#e94560';ctx2.shadowBlur=3;ctx2.fillRect(rx-10,gy-20,12,3);ctx2.shadowBlur=0; });
      ctx2.fillStyle='#020308'; ctx2.fillRect(w*.04,gy-75,82,75);
      ctx2.strokeStyle='rgba(200,169,110,0.25)';ctx2.lineWidth=1;ctx2.strokeRect(w*.04,gy-75,82,75);
    },
    medicine: ()=>{
      ctx2.strokeStyle='rgba(122,199,79,0.4)';ctx2.lineWidth=3;
      ctx2.beginPath();ctx2.moveTo(w*.5,h*.1);ctx2.lineTo(w*.5,h*.55);ctx2.stroke();
      ctx2.beginPath();ctx2.moveTo(w*.3,h*.28);ctx2.lineTo(w*.7,h*.28);ctx2.stroke();
      [w*.3,w*.48,w*.64].forEach(bx=>{ctx2.fillStyle='#000';ctx2.shadowColor='#7ac74f';ctx2.shadowBlur=5;ctx2.fillRect(bx,gy-52,8,16);ctx2.shadowBlur=0;});
    },
    wounded: ()=>{
      // Man on floor
      ctx2.fillStyle='#000'; ctx2.shadowColor='#e94560'; ctx2.shadowBlur=6;
      ctx2.fillRect(w*.15,gy-12,w*.45,10);
      ctx2.beginPath();ctx2.arc(w*.6,gy-16,9,0,Math.PI*2);ctx2.fill();
      ctx2.shadowBlur=0;
      fig(ctx2,w*.75,gy,'#c8a96e',0.55,'female');
    },
  };
  (scenes[id] || scenes.food_find)();
}
function fig(ctx2, x, gy, glow, scale, style) {
  const sc = scale || 0.55;
  const bob = Math.sin(T*1.5)*0.6;
  ctx2.save();
  ctx2.translate(x, gy + bob);
  ctx2.scale(sc, sc);
  ctx2.fillStyle = '#000';
  ctx2.shadowColor = glow; ctx2.shadowBlur = 6;
  // body
  ctx2.beginPath(); ctx2.roundRect(-9,-46,18,32,4); ctx2.fill();
  // legs (static in modal)
  ctx2.fillRect(-9,-16,8,20); ctx2.fillRect(1,-16,8,20);
  ctx2.beginPath(); ctx2.roundRect(-10,4,12,5,2); ctx2.fill();
  ctx2.beginPath(); ctx2.roundRect(0,4,12,5,2); ctx2.fill();
  // head
  ctx2.shadowBlur = 10;
  ctx2.beginPath(); ctx2.arc(0,-62,16,0,Math.PI*2); ctx2.fill();
  // hair
  if (style === 'female' || !style) {
    ctx2.beginPath(); ctx2.moveTo(-14,-4); ctx2.quadraticCurveTo(-20,6,-14,18); ctx2.quadraticCurveTo(-8,22,-4,12); ctx2.lineTo(-16,6); ctx2.fill();
  }
  // eyes
  ctx2.fillStyle='rgba(255,255,255,0.9)'; ctx2.shadowColor='#fff'; ctx2.shadowBlur=3;
  ctx2.beginPath(); ctx2.arc(-5,-60,3,0,Math.PI*2); ctx2.fill();
  ctx2.beginPath(); ctx2.arc(5,-60,3,0,Math.PI*2); ctx2.fill();
  ctx2.fillStyle='#000'; ctx2.shadowBlur=0;
  ctx2.beginPath(); ctx2.arc(-4,-60,1.2,0,Math.PI*2); ctx2.fill();
  ctx2.beginPath(); ctx2.arc(6,-60,1.2,0,Math.PI*2); ctx2.fill();
  ctx2.restore();
}

// ── Game over ──────────────────────────────────────────────────────────────
function showGO() {
  $('go').classList.add('open');
  $('gs').innerHTML=`Survived <span>${S.day} days</span><br>Moral: <span>${mword(S.moral)}</span><br>Food remaining: <span>${S.food}</span>`;
}
function reset() {
  Object.assign(S, { day:1, phase:'day', moral:80, food:8, meds:2, parts:5, fuel:3, shelter:1,
    mara:{hp:100,fd:80,md:90,alive:true}, eli:{hp:100,fd:80,md:85,alive:true} });
  usedEvt=[]; evtQ=[]; scavX=-60; pickerWho=null; pickerLoc=null;
  $('go').classList.remove('open');
  $('phaseBtn').onclick = openPicker;
  logEl.innerHTML='<div class="ll hi" id="l0">The shelter holds.</div>';
  updateUI();
}

// ── Loop ────────────────────────────────────────────────────────────────────
(function loop(t) { drawBg(t); requestAnimationFrame(loop); })(0);
// Load all assets (parallax layers, base interiors, sprite walk sheet) then init UI
loadAssets(() => {
  loadSprites(() => {
    updateUI();
  });
});
